<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="assets/logos/covalent_white_logo.png">
    <title>Covalent Studios</title>
    <meta property="og:title" content="covalent studios">
    <meta property="og:description" content="a modern production company.">
    <meta property="og:image" content="https://covalentstudios.co/assets/images/og-image.png">
    <meta property="og:url" content="https://covalentstudios.co">
    <meta property="og:type" content="website">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* CSS Variables */
        :root {
            --ice: #FAFBFC;
            --bond-blue: #5979e9;
            --black: #0A0A0A;
            --gray: #6B7280;
            --white: #FFFFFF;
        }

        /* Reset */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none !important;
        }

        ::selection {
            background: var(--black);
            color: var(--white);
            -webkit-text-fill-color: var(--white);
        }

        html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
        }

        /* Body — no scroll, scroll container handles it */
        body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--black);
            color: var(--white);
            letter-spacing: -0.07em;
        }

        /* ==================== */
        /* HORIZONTAL SCROLL CONTAINER */
        /* ==================== */
        .scroll-container {
            display: flex;
            flex-direction: row;
            overflow-x: scroll;
            overflow-y: hidden;
            width: 100vw;
            height: 100vh;
            scroll-snap-type: x mandatory;
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* IE/Edge */
        }

        .scroll-container::-webkit-scrollbar {
            display: none; /* Chrome, Safari */
        }

        /* Custom Cursor */
        .cursor {
            position: fixed;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--white);
            pointer-events: none;
            z-index: 10001;
            mix-blend-mode: difference;
            transform: translate(-50%, -50%);
        }

        /* Navigation - Plus Menu */
        .nav {
            position: fixed;
            top: 0;
            right: 0;
            padding: 2rem;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
        }

        .nav.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .menu-toggle {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .menu-toggle.active {
            transform: rotate(45deg);
        }

        .plus-icon {
            width: 22px;
            height: 22px;
            position: relative;
        }

        .plus-icon span {
            display: block;
            position: absolute;
            width: 100%;
            height: 2px;
            background: var(--white);
            top: 50%;
            left: 0;
            transition: all 0.3s ease;
        }

        .plus-icon span:first-child {
            transform: translateY(-50%) rotate(90deg);
        }

        .plus-icon span:last-child {
            transform: translateY(-50%);
        }

        /* Expanded Menu */
        .menu-overlay {
            position: fixed;
            top: 0;
            right: 0;
            width: 100%;
            height: 100%;
            z-index: 999;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: flex-end;
            padding: 7rem 3rem 3rem;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .menu-overlay.active {
            pointer-events: auto;
            opacity: 1;
        }

        .menu-links {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .menu-link {
            font-size: clamp(1rem, 1.8vw, 1.5rem);
            font-weight: 500;
            color: var(--white);
            text-decoration: none;
            opacity: 0;
            transform: translateX(30px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: -0.07em;
            line-height: 1.1;
            position: relative;
            display: inline-block;
        }

        .menu-overlay.active .menu-link {
            opacity: 0.6;
            transform: translateX(0);
        }

        .menu-overlay.active .menu-link:nth-child(1) { transition-delay: 0.05s; }
        .menu-overlay.active .menu-link:nth-child(2) { transition-delay: 0.1s; }

        .menu-link:hover {
            opacity: 1 !important;
        }

        .menu-link-gradient {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #5979e9, #7B93FF, #5979e9, #3A5BD4);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 3s ease infinite;
            pointer-events: none;
            -webkit-mask-image: radial-gradient(circle at var(--mx, 0px) var(--my, 0px), black var(--spread, 0%), transparent var(--spread, 0%));
            mask-image: radial-gradient(circle at var(--mx, 0px) var(--my, 0px), black var(--spread, 0%), transparent var(--spread, 0%));
            opacity: 0;
            transition: opacity 0s;
        }

        .menu-link:hover .menu-link-gradient {
            opacity: 1;
        }

        .menu-link.current {
            opacity: 1 !important;
        }

        /* Logo top-left */
        .logo-bottom {
            position: fixed;
            top: 2rem;
            left: 2rem;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
        }

        .logo-bottom.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .logo-bottom svg {
            width: 40px;
            height: 40px;
        }

        /* Scroll Progress Indicator — lives inside footer, grows from center */
        .scroll-progress {
            flex: 1;
            margin: 0 1.5rem;
            height: 4px;
            position: relative;
            align-self: center;
        }

        .scroll-progress-line {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            right: 50%;
            background: var(--white);
            opacity: 1;
            border-radius: 2px;
            transition: left 0.55s cubic-bezier(0.4, 0, 0.2, 1),
                        right 0.55s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ==================== */
        /* FIXED BACKGROUND VIDEO (hero + about panels) */
        /* ==================== */
        .fixed-video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            background: var(--black);
            transition: opacity 0.6s ease;
        }

        .fixed-video-bg iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scale(1.05);
            transform-origin: center center;
            border: none;
            pointer-events: none;
        }

        /* ==================== */
        /* HERO SECTION — logo only */
        /* ==================== */
        .hero-section {
            position: relative;
            min-width: 100vw;
            height: 100vh;
            flex-shrink: 0;
            scroll-snap-align: start;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        /* Large centered logomark */
        .hero-wordmark {
            position: relative;
            z-index: 10;
            width: 37.5vw;
            max-width: 350px;
            height: auto;
            user-select: none;
            -webkit-user-select: none;
            -webkit-user-drag: none;
            pointer-events: none;
        }


        /* ==================== */
        /* PROJECT SECTIONS */
        /* ==================== */
        .project-section {
            position: relative;
            min-width: 100vw;
            height: 100vh;
            flex-shrink: 0;
            scroll-snap-align: start;
            z-index: 2;
            background: var(--black);
            overflow: hidden;
        }

        .project-video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            will-change: transform;
        }

        .project-video-container iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: 177.78vh; /* 16:9 */
            height: 56.25vw; /* 16:9 */
            transform: translate(-50%, -50%) scale(1.3);
            border: none;
            pointer-events: none;
        }

        /* Text overlay — vertically centered, horizontally centered */
        .project-info {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            width: 100%;
            text-align: center;
            transform: translateY(-50%);
            z-index: 10;
        }

        .project-client-link {
            text-decoration: none;
            color: inherit;
        }

        .project-client {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(3.5rem, 7vw, 7rem);
            font-weight: 700;
            color: var(--white);
            line-height: 1;
            letter-spacing: -0.07em;
            text-transform: lowercase;
            margin: 0;
            opacity: 0;
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            display: inline-block;
        }

        /* Radial blue-gradient overlay — shown only while actively hovering */
        .project-client::before {
            content: attr(data-text);
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, #5979e9, #7B93FF, #5979e9, #3A5BD4);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 3s ease infinite;
            pointer-events: none;
            -webkit-mask-image: radial-gradient(circle at var(--mx, 50%) var(--my, 50%), black var(--spread, 0%), transparent var(--spread, 0%));
            mask-image: radial-gradient(circle at var(--mx, 50%) var(--my, 50%), black var(--spread, 0%), transparent var(--spread, 0%));
            display: none; /* hidden by default — display:none is more reliable than opacity:0 */
        }

        .project-client.is-hovered::before {
            display: block;
        }

        .project-subtitle {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(1rem, 2vw, 1.5rem);
            font-weight: 300;
            color: var(--white);
            opacity: 0;
            line-height: 1.3;
            letter-spacing: -0.07em;
            text-transform: lowercase;
            margin: 0.05em 0 0 0;
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1) 0.08s;
        }

        /* When section is in view, fade text in */
        .project-section.in-view .project-client {
            opacity: 1;
        }

        .project-section.in-view .project-subtitle {
            opacity: 0.7;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .nav { padding: 1.5rem; }
            .logo-bottom { top: 1.5rem; left: 1.5rem; }
            .menu-overlay { padding: 6rem 2.5rem 2.5rem; }
        }

        @media (max-width: 768px) {
            .nav { padding: 1.5rem; }
            .logo-bottom { top: 1.5rem; left: 1.5rem; }
            .logo-bottom svg { width: 32px; height: 32px; }
            .menu-overlay { padding: 5rem 1.5rem 1.5rem; }
        }

        /* ==================== */
        /* DARK MODE OVERRIDES */
        /* ==================== */
        body.dark-mode {
            background-color: #0A0A0A !important;
            color: #FF4500 !important;
            -webkit-text-fill-color: #FF4500;
        }

        body.dark-mode ::selection {
            background: #FF4500 !important;
            color: #0A0A0A !important;
            -webkit-text-fill-color: #0A0A0A !important;
        }

        body.dark-mode .cursor { background: #FF4500 !important; }
        body.dark-mode .plus-icon span { background: #FF4500 !important; }

        body.dark-mode .menu-link {
            color: #FF4500 !important;
            -webkit-text-fill-color: #FF4500;
        }

        body.dark-mode .logo-bottom svg path { fill: #FF4500 !important; }
        body.dark-mode .footer { background: #0A0A0A !important; }

        body.dark-mode .footer-left,
        body.dark-mode .footer-link,
        body.dark-mode .footer-link .char {
            color: #FF4500 !important;
            -webkit-text-fill-color: #FF4500;
        }

        body.dark-mode .footer-link::after { background: #FF4500 !important; }
        body.dark-mode .social-link svg { fill: #FF4500 !important; }

        body.dark-mode .contact-email {
            color: #FF4500 !important;
            -webkit-text-fill-color: #FF4500;
        }

        body.dark-mode .clock-row {
            color: #FF4500 !important;
            -webkit-text-fill-color: #FF4500;
        }

body.dark-mode .project-client {
            color: #FF4500 !important;
            -webkit-text-fill-color: #FF4500;
        }

        body.dark-mode .project-subtitle {
            color: #FF4500 !important;
            -webkit-text-fill-color: #FF4500;
        }

        body.dark-mode .scroll-progress-line { background: #FF4500 !important; }

        body.dark-mode .director-name {
            color: #FF4500 !important;
            -webkit-text-fill-color: #FF4500;
        }

        body.dark-mode .director-credit {
            color: #FF4500 !important;
            -webkit-text-fill-color: #FF4500;
        }

        body.dark-mode .case-study-link {
            color: #FF4500 !important;
            -webkit-text-fill-color: #FF4500;
        }

        body.dark-mode .case-study-link::after { background: #FF4500 !important; }

        body.dark-mode .hero-wordmark { filter: brightness(0) saturate(100%) invert(38%) sepia(99%) saturate(1200%) hue-rotate(358deg) brightness(103%) contrast(107%) !important; }

        /* ==================== */
        /* DARK MODE TOGGLE */
        /* ==================== */
        .dark-mode-toggle {
            display: flex;
            align-items: center;
            cursor: none;
        }

        .dark-mode-toggle input { display: none; }

        .toggle-track {
            width: 28px;
            height: 16px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 8px;
            position: relative;
            transition: background 0.3s ease;
            cursor: none;
            display: block;
        }

        .toggle-track::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 12px;
            height: 12px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dark-mode-toggle input:checked + .toggle-track {
            background: rgba(255, 69, 0, 0.8);
        }

        .dark-mode-toggle input:checked + .toggle-track::after {
            transform: translateX(12px);
            background: #FF4500;
        }

        /* ==================== */
        /* LOADING OVERLAY      */
        /* ==================== */
        .loading-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: var(--black);
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease;
        }
        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .loading-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            transition: opacity 0.5s ease;
        }
        .loading-content.fade-out {
            opacity: 0;
        }
        .loading-label {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.7rem;
            font-weight: 300;
            color: rgba(255,255,255,0.5);
            letter-spacing: 0.1em;
            text-transform: lowercase;
        }
        .loading-bar-track {
            width: 100px;
            height: 3px;
            background: rgba(255,255,255,0.15);
            border-radius: 1px;
            overflow: hidden;
        }
        .loading-bar-fill {
            height: 100%;
            width: 0%;
            background: var(--white);
            border-radius: 1px;
            transition: width 0.4s ease;
        }
        .loading-tagline {
            position: absolute;
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(0.6rem, 1.2vw, 1.2rem);
            font-weight: 500;
            color: var(--white);
            letter-spacing: -0.07em;
            text-align: center;
            opacity: 0;
            transition: opacity 0.6s ease;
            pointer-events: none;
        }
        .loading-tagline.visible {
            opacity: 1;
        }

        /* ==================== */
        /* GLOBAL FOOTER        */
        /* ==================== */
        .site-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1001;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        .site-footer.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .site-footer-left {
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--white);
            opacity: 0.5;
        }
        .site-footer-right {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            opacity: 0.5;
        }
        .site-footer-link {
            font-size: 0.7rem;
            color: var(--white);
            text-decoration: none;
        }
        .site-footer-socials {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .social-link {
            color: #ffffff;
            display: flex;
            align-items: center;
        }
        .site-footer-social {
            display: flex;
            align-items: center;
        }
        .site-footer-social svg {
            width: 16px;
            height: 16px;
            fill: var(--white);
        }

    </style>
</head>

    <!-- Motion library -->
    <script src="https://cdn.jsdelivr.net/npm/motion@12.34.0/dist/motion.js"></script>

    <script>
        // ==================== //
        // REFERENCES
        // ==================== //
        const scrollContainer = document.getElementById('scrollContainer');
        const fixedVideoBg   = document.getElementById('fixedVideoBg');
        const logoBottom     = document.getElementById('logoBottom');
        const navEl          = document.querySelector('.nav');
        const menuToggle     = document.getElementById('menuToggle');
        const menuOverlay    = document.getElementById('menuOverlay');
        const progressLine   = document.getElementById('progressLine');
        const siteFooter     = document.querySelector('.site-footer');

        // ==================== //
        // LOGO — scroll back to start
        // ==================== //
        logoBottom.addEventListener('click', (e) => {
            e.preventDefault();
            scrollContainer.scrollTo({ left: 0, behavior: 'smooth' });
        });

        // ==================== //
        // MENU
        // ==================== //
        menuToggle.addEventListener('click', () => {
            menuToggle.classList.toggle('active');
            menuOverlay.classList.toggle('active');
        });

        menuOverlay.addEventListener('click', (e) => {
            if (e.target === menuOverlay) {
                menuToggle.classList.remove('active');
                menuOverlay.classList.remove('active');
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && menuOverlay.classList.contains('active')) {
                menuToggle.classList.remove('active');
                menuOverlay.classList.remove('active');
            }
        });

        // ==================== //
        // MENU LINK GRADIENT SPREAD
        // ==================== //
        document.querySelectorAll('.menu-link').forEach(link => {
            const gradient = document.createElement('span');
            gradient.classList.add('menu-link-gradient');
            gradient.textContent = link.textContent;
            gradient.style.setProperty('--spread', '0%');
            link.appendChild(gradient);

            let af;

            link.addEventListener('mouseenter', (e) => {
                const rect = link.getBoundingClientRect();
                gradient.style.setProperty('--mx', (e.clientX - rect.left) + 'px');
                gradient.style.setProperty('--my', (e.clientY - rect.top) + 'px');
                gradient.style.setProperty('--spread', '0%');
                let t0 = null;
                const run = (ts) => {
                    if (!t0) t0 = ts;
                    const p = Math.min((ts - t0) / 900, 1);
                    gradient.style.setProperty('--spread', (( 1 - Math.pow(1 - p, 3)) * 200) + '%');
                    if (p < 1) af = requestAnimationFrame(run);
                };
                cancelAnimationFrame(af);
                af = requestAnimationFrame(run);
            });

            link.addEventListener('mouseleave', () => {
                cancelAnimationFrame(af);
                const cur = parseFloat(gradient.style.getPropertyValue('--spread')) || 200;
                let t0 = null;
                const run = (ts) => {
                    if (!t0) t0 = ts;
                    const p = Math.min((ts - t0) / 500, 1);
                    gradient.style.setProperty('--spread', (cur * (1 - (1 - Math.pow(1 - p, 3)))) + '%');
                    if (p < 1) af = requestAnimationFrame(run);
                };
                af = requestAnimationFrame(run);
            });
        });

        // ==================== //
        // PROJECT TITLE RADIAL HOVER
        // ==================== //
        document.querySelectorAll('.project-client').forEach(title => {
            title.setAttribute('data-text', title.textContent.trim());

            title.addEventListener('mouseenter', (e) => {
                title.classList.add('is-hovered');
                const rect = title.getBoundingClientRect();
                title.style.setProperty('--mx', (e.clientX - rect.left) + 'px');
                title.style.setProperty('--my', (e.clientY - rect.top) + 'px');
                title.style.setProperty('--spread', '0%');
                let t0 = null;
                const run = (ts) => {
                    if (!t0) t0 = ts;
                    const p = Math.min((ts - t0) / 1400, 1);
                    title.style.setProperty('--spread', ((1 - Math.pow(1 - p, 3)) * 200) + '%');
                    if (p < 1) title._af = requestAnimationFrame(run);
                };
                cancelAnimationFrame(title._af);
                title._af = requestAnimationFrame(run);
            });

            title.addEventListener('mouseleave', () => {
                cancelAnimationFrame(title._af);
                const cur = parseFloat(title.style.getPropertyValue('--spread')) || 200;
                let t0 = null;
                const run = (ts) => {
                    if (!t0) t0 = ts;
                    const p = Math.min((ts - t0) / 600, 1);
                    title.style.setProperty('--spread', (cur * (1 - (1 - Math.pow(1 - p, 3)))) + '%');
                    if (p < 1) {
                        title._af = requestAnimationFrame(run);
                    } else {
                        title.classList.remove('is-hovered'); // hide ::before after fully retracted
                    }
                };
                title._af = requestAnimationFrame(run);
            });
        });

        // ==================== //
        // CUSTOM CURSOR
        // ==================== //
        const cursor = document.getElementById('cursor');
        let mouseX = 0, mouseY = 0, cursorX = 0, cursorY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        (function animateCursor() {
            cursorX += (mouseX - cursorX) * 0.35;
            cursorY += (mouseY - cursorY) * 0.35;
            cursor.style.left = cursorX + 'px';
            cursor.style.top  = cursorY + 'px';
            requestAnimationFrame(animateCursor);
        })();

        // ==================== //
        // WHEEL → HORIZONTAL NAV
        // Vertical trackpad scroll drives horizontal panel changes
        // Lock releases only after scrolling fully stops (not a fixed timer)
        // ==================== //
        let wheelDelta = 0;
        let wheelTimer = null;
        let isWheelScrolling = false;
        let scrollEndTimer = null;
        const WHEEL_THRESHOLD = 20;

        // Release lock once the container stops scrolling (200ms after last scroll event)
        // Also clean up any hover states that got stuck during scroll
        scrollContainer.addEventListener('scroll', () => {
            document.querySelectorAll('.project-client.is-hovered').forEach(el => {
                cancelAnimationFrame(el._af);
                el.classList.remove('is-hovered');
            });

            if (isWheelScrolling) {
                clearTimeout(scrollEndTimer);
                scrollEndTimer = setTimeout(() => {
                    isWheelScrolling = false;
                    wheelDelta = 0;
                }, 200);
            }
        });

        window.addEventListener('wheel', (e) => {
            e.preventDefault();
            if (isWheelScrolling) return;

            wheelDelta += e.deltaY;
            clearTimeout(wheelTimer);
            wheelTimer = setTimeout(() => { wheelDelta = 0; }, 300);

            const maxLeft = scrollContainer.scrollWidth - scrollContainer.clientWidth;

            if (wheelDelta > WHEEL_THRESHOLD) {
                wheelDelta = 0;
                if (scrollContainer.scrollLeft >= maxLeft - 1) return; // already at right edge
                isWheelScrolling = true;
                scrollContainer.scrollBy({ left: window.innerWidth, behavior: 'smooth' });
            } else if (wheelDelta < -WHEEL_THRESHOLD) {
                wheelDelta = 0;
                if (scrollContainer.scrollLeft <= 1) return; // already at left edge
                isWheelScrolling = true;
                scrollContainer.scrollBy({ left: -window.innerWidth, behavior: 'smooth' });
            }
        }, { passive: false });

        // ==================== //
        // KEYBOARD NAV (horizontal)
        // ==================== //
        document.addEventListener('keydown', (e) => {
            if (menuOverlay.classList.contains('active')) return;
            if (e.key === 'ArrowRight' || e.key === 'PageDown') {
                e.preventDefault();
                scrollContainer.scrollBy({ left: window.innerWidth, behavior: 'smooth' });
            } else if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
                e.preventDefault();
                scrollContainer.scrollBy({ left: -window.innerWidth, behavior: 'smooth' });
            }
        });

        // ==================== //
        // PARALLAX TEXT (project-info sweeps in from scroll direction)
        // ==================== //
        const projectSections = document.querySelectorAll('.project-section');

        function updateParallax() {
            const scrollLeft = scrollContainer.scrollLeft;
            const vw = window.innerWidth;
            projectSections.forEach(section => {
                const panelLeft = section.offsetLeft;
                // Distance from viewport left edge: positive = to the right, negative = to the left
                const offset = panelLeft - scrollLeft;
                const info = section.querySelector('.project-info');
                if (info) {
                    // Parallax factor: text moves at 65% of scroll speed
                    // Creates a dramatic sweep from far-right as panel comes into view
                    const tx = offset * 0.65;
                    info.style.transform = `translateY(-50%) translateX(${tx}px)`;
                }
            });
        }

        scrollContainer.addEventListener('scroll', updateParallax, { passive: true });
        window.addEventListener('resize', updateParallax);
        updateParallax(); // set initial positions

        // ==================== //
        // INTERSECTION OBSERVER (8 panels)
        // ==================== //
        const allSectionIds = [
            'heroSection',
            'project1', 'project2', 'project3', 'project4',
            'project5', 'project6', 'project7'
        ];

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const id = entry.target.id;

                if (entry.isIntersecting && entry.intersectionRatio >= 0.5) {
                    const idx = allSectionIds.indexOf(id);

                    // Progress line — grows from center outward each panel
                    const pct  = idx / (allSectionIds.length - 1) * 100;
                    const half = pct / 2;
                    progressLine.style.left  = (50 - half) + '%';
                    progressLine.style.right = (50 - half) + '%';

                    // Logo + nav: hidden on hero, visible on projects
                    const onHero = id === 'heroSection';
                    logoBottom.classList.toggle('visible', !onHero);
                    navEl.classList.toggle('visible', !onHero);
                    siteFooter.classList.toggle('visible', !onHero);

                    // Hero reel: show on hero panel only
                    fixedVideoBg.style.opacity = onHero ? '1' : '0';

                    // Project in-view class
                    if (id.startsWith('project')) {
                        entry.target.classList.add('in-view');
                    }
                } else if (!entry.isIntersecting) {
                    if (id.startsWith('project')) {
                        entry.target.classList.remove('in-view');
                    }
                }
            });
        }, {
            root: scrollContainer,
            threshold: 0.5
        });

        allSectionIds.forEach(id => {
            const el = document.getElementById(id);
            if (el) observer.observe(el);
        });

        // ==================== //
        // PROJECT ANIMATIONS (Motion)
        // ==================== //
        const { animate, inView } = Motion;

        document.querySelectorAll('.project-section').forEach((section) => {
            const client   = section.querySelector('.project-client');
            const subtitle = section.querySelector('.project-subtitle');

            inView(section, () => {
                if (client)   animate(client,   { opacity: [0, 1]   }, { duration: 0.7, easing: [0.22, 1, 0.36, 1] });
                if (subtitle) animate(subtitle, { opacity: [0, 0.7] }, { duration: 0.7, delay: 0.12, easing: [0.22, 1, 0.36, 1] });

                return () => {
                    if (client)   animate(client,   { opacity: 0 }, { duration: 0.3 });
                    if (subtitle) animate(subtitle, { opacity: 0 }, { duration: 0.3 });
                };
            }, { amount: 0.5 });
        });
    </script>


    <script>
        (function() {
            const toggle = document.getElementById('darkModeToggle');
            if (localStorage.getItem('darkMode') === 'true') {
                document.body.classList.add('dark-mode');
                toggle.checked = true;
            }
            toggle.addEventListener('change', () => {
                document.body.classList.toggle('dark-mode');
                localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
            });

            // Cursor inflate on toggle hover
            const cursorEl = document.getElementById('cursor');
            const label = document.querySelector('.dark-mode-toggle');
            label.addEventListener('mouseenter', () => {
                cursorEl.style.transform = 'translate(-50%, -50%) scale(1.8)';
                cursorEl.style.transition = 'transform 0.2s ease, left 0s, top 0s';
            });
            label.addEventListener('mouseleave', () => {
                cursorEl.style.transform = 'translate(-50%, -50%) scale(1)';
                cursorEl.style.transition = 'transform 0.2s ease, left 0s, top 0s';
            });
        })();
    </script>

    <script>
    // ==================== //
    // LOADING SCREEN
    // ==================== //
    (function() {
        const overlay      = document.getElementById('loadingOverlay');
        const barFill      = document.getElementById('loadingBarFill');
        const content      = document.getElementById('loadingContent');
        const tagline      = document.getElementById('loadingTagline');
        const allIframes   = document.querySelectorAll('iframe[src*="vimeo"]');
        const total        = allIframes.length;
        let loaded         = 0;
        let completed      = false;

        function setProgress(n) {
            barFill.style.width = Math.round((n / total) * 100) + '%';
        }

        function runSequence() {
            if (completed) return;
            completed = true;

            // Fill bar to 100%
            setProgress(total);

            // After bar fills: fade out loading text
            setTimeout(() => {
                content.classList.add('fade-out');

                // Show tagline
                setTimeout(() => {
                    tagline.classList.add('visible');

                    // Hold for 1.5s, then fade out tagline
                    setTimeout(() => {
                        tagline.classList.remove('visible');

                        // Once tagline fades, dismiss overlay
                        setTimeout(() => {
                            overlay.classList.add('hidden');
                        }, 700);
                    }, 1500);
                }, 500);
            }, 400);
        }

        allIframes.forEach(iframe => {
            iframe.addEventListener('load', () => {
                loaded++;
                setProgress(loaded);
                if (loaded >= total) runSequence();
            });
        });

        // Fallback: 8s max wait
        setTimeout(() => {
            if (!completed) {
                loaded = total;
                runSequence();
            }
        }, 8000);
    })();
    </script>
