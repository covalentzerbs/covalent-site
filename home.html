<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="assets/logos/covalent_white_logo.png">
    <title>Covalent Studios</title>
    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-T14F8BVFLJ"></script>

    <meta property="og:title" content="covalent studios">

    <meta property="og:image" content="https://covalentstudios.co/assets/images/og-image.png">
    <meta property="og:url" content="https://covalentstudios.co">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* CSS Variables */
        :root {
            --ice: #FAFBFC;
            --bond-blue: #5979e9;
            --black: #0A0A0A;
            --gray: #6B7280;
            --white: #FFFFFF;
        }

        /* Reset */
        /* Explicit root — bfcache restore can miss the * selector */
        html, body, .scroll-container { cursor: none !important; }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none !important;
            -webkit-tap-highlight-color: transparent;
        }

        a, button, label { outline: none; }

        ::selection {
            background: var(--black);
            color: var(--white);
            -webkit-text-fill-color: var(--white);
        }

        html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
        }

        /* Body — no scroll, scroll container handles it */
        body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--white);
            color: var(--black);
            letter-spacing: -0.07em;
        }

        /* ==================== */
        /* HORIZONTAL SCROLL CONTAINER */
        /* ==================== */
        .scroll-container {
            display: flex;
            flex-direction: row;
            overflow-x: scroll;
            overflow-y: hidden;
            width: 100vw;
            height: 100vh;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* IE/Edge */
        }

        .scroll-container::-webkit-scrollbar {
            display: none; /* Chrome, Safari */
        }

        /* Custom Cursor */
        .cursor {
            position: fixed;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--white);
            pointer-events: none;
            z-index: 10001;
            mix-blend-mode: difference;
            left: 0;
            top: 0;
            will-change: transform;
        }

        /* Navigation - Plus Menu */
        .nav {
            position: fixed;
            top: 0;
            right: 0;
            padding: 2rem;
            z-index: 10001;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
        }

        .nav.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .menu-toggle {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .menu-toggle.active {
            transform: rotate(45deg);
        }

        .plus-icon {
            width: 22px;
            height: 22px;
            position: relative;
        }

        .plus-icon span {
            display: block;
            position: absolute;
            width: 100%;
            height: 2px;
            background: var(--black);
            top: 50%;
            left: 0;
            transition: all 0.3s ease;
        }

        .plus-icon span:first-child {
            transform: translateY(-50%) rotate(90deg);
        }

        .plus-icon span:last-child {
            transform: translateY(-50%);
        }

        /* Expanded Menu */
        .menu-overlay {
            position: fixed;
            top: 0;
            right: 0;
            width: 100%;
            height: 100%;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: flex-end;
            padding: 7rem 3rem 3rem;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .menu-overlay.active {
            pointer-events: auto;
            opacity: 1;
        }

        .menu-links {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .menu-link {
            font-size: clamp(1rem, 1.8vw, 1.5rem);
            font-weight: 500;
            color: var(--black);
            text-decoration: none;
            opacity: 0;
            transform: translateX(30px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: -0.07em;
            line-height: 1.1;
            position: relative;
            display: inline-block;
        }

        .menu-overlay.active .menu-link {
            opacity: 0.6;
            transform: translateX(0);
        }

        .menu-overlay.active .menu-link:nth-child(1) { transition-delay: 0.05s; }
        .menu-overlay.active .menu-link:nth-child(2) { transition-delay: 0.1s; }
        .menu-overlay.active .menu-link:nth-child(3) { transition-delay: 0.15s; }

        .menu-link:hover {
            opacity: 1 !important;
        }

        .menu-link-gradient {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #5979e9, #7B93FF, #5979e9, #3A5BD4);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 3s ease infinite;
            pointer-events: none;
            -webkit-mask-image: radial-gradient(circle at var(--mx, 0px) var(--my, 0px), black var(--spread, 0%), transparent var(--spread, 0%));
            mask-image: radial-gradient(circle at var(--mx, 0px) var(--my, 0px), black var(--spread, 0%), transparent var(--spread, 0%));
            opacity: 0;
            transition: opacity 0s;
        }

        .menu-link:hover .menu-link-gradient {
            opacity: 1;
        }

        .menu-link.current {
            opacity: 1 !important;
        }

        /* Logo top-left */
        .logo-bottom {
            position: fixed;
            top: 2rem;
            left: 2rem;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
        }

        .logo-bottom.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .logo-bottom svg {
            width: 40px;
            height: 40px;
        }

        /* Scroll Progress Indicator — lives inside footer, grows from center */
        .scroll-progress {
            flex: 1;
            margin: 0 1.5rem;
            height: 4px;
            position: relative;
            align-self: center;
        }

        .scroll-progress-line {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            right: 50%;
            background: var(--black);
            opacity: 1;
            border-radius: 2px;
            transition: left 0.55s cubic-bezier(0.4, 0, 0.2, 1),
                        right 0.55s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ==================== */
        /* FIXED BACKGROUND VIDEO (hero + about panels) */
        /* ==================== */
        .fixed-video-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 75%;
            aspect-ratio: 16 / 9;
            transform: translate(-50%, -50%);
            z-index: 0;
            overflow: hidden;
            border-radius: 4px;
            transition: opacity 0.6s ease;
        }

        .fixed-video-bg iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            pointer-events: none;
        }

        /* ==================== */
        /* HERO SECTION — logo only */
        /* ==================== */
        .hero-section {
            position: relative;
            min-width: 100vw;
            width: 100vw;
            height: 100vh;
            flex-shrink: 0;
            scroll-snap-align: start;
            scroll-snap-stop: normal;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        /* Large centered logomark */
        .hero-wordmark {
            position: relative;
            z-index: 10;
            width: 37.5vw;
            max-width: 350px;
            height: auto;
            user-select: none;
            -webkit-user-select: none;
            -webkit-user-drag: none;
            pointer-events: none;
        }


        /* ==================== */
        /* PROJECT SECTIONS */
        /* ==================== */
        .project-section {
            position: relative;
            min-width: 100vw;
            width: 100vw;
            height: 100vh;
            flex-shrink: 0;
            scroll-snap-align: start;
            scroll-snap-stop: normal;
            z-index: 2;
            background: var(--white);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .project-video-container {
            position: relative;
            width: 75%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            border-radius: 4px;
        }

        .project-video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            pointer-events: none;
        }

        /* Text overlay — centered on video */
        .project-info {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 75%;
            text-align: center;
            z-index: 10;
        }

        .project-client-link {
            text-decoration: none;
            color: inherit;
        }

        .project-client {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(3.5rem, 7vw, 7rem);
            font-weight: 700;
            color: var(--white);
            line-height: 1;
            letter-spacing: -0.07em;
            text-transform: lowercase;
            text-align: left; /* prevent inherited center desync with ::before */
            margin: 0;
            opacity: 0;
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            display: inline-block;
        }

        /* Hide parent text only while cursor is on it — no double-render bleed */
        .project-client.is-hovered {
            -webkit-text-fill-color: transparent;
            color: transparent;
        }

        /* Radial blue-gradient overlay */
        .project-client::before {
            content: attr(data-text);
            position: absolute;
            top: 0; left: 0; right: -0.12em; bottom: 0; /* slight right overhang covers last-glyph ink */
            text-align: left;
            background: linear-gradient(90deg, #5979e9, #7B93FF, #5979e9, #3A5BD4);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 3s ease infinite;
            pointer-events: none;
            -webkit-mask-image: radial-gradient(circle at var(--mx, 50%) var(--my, 50%), black var(--spread, 0%), transparent var(--spread, 0%));
            mask-image: radial-gradient(circle at var(--mx, 50%) var(--my, 50%), black var(--spread, 0%), transparent var(--spread, 0%));
            display: none;
        }

        /* Show ::before while cursor is on it OR while retract animation plays */
        .project-client.is-hovered::before,
        .project-client.is-animating::before {
            display: block;
        }

        .project-subtitle {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(1rem, 2vw, 1.5rem);
            font-weight: 300;
            color: var(--white);
            opacity: 0;
            line-height: 1.3;
            letter-spacing: -0.07em;
            text-transform: lowercase;
            margin: 0.05em 0 0 0;
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1) 0.08s;
        }

        /* When section is in view, fade text in */
        .project-section.in-view .project-client {
            opacity: 1;
        }

        .project-section.in-view .project-subtitle {
            opacity: 0.7;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .nav { padding: 1.5rem; }
            .logo-bottom { top: 1.5rem; left: 1.5rem; }
            .menu-overlay { padding: 6rem 2.5rem 2.5rem; }
        }

        @media (max-width: 768px) {
            .nav { padding: 1.5rem; }
            .logo-bottom { top: 1.5rem; left: 1.5rem; }
            .logo-bottom svg { width: 32px; height: 32px; }
            .menu-overlay { padding: 5rem 1.5rem 1.5rem; }

            /* Use dynamic viewport height — Safari ignores vh percentage chains */
            .scroll-container { height: 100dvh; }
            .project-section, .hero-section { height: 100dvh; }
            .fixed-video-bg { height: 100dvh; }
            .loading-overlay { height: 100dvh; }

            /* Video fills container on mobile */
            .project-video-container,
            .fixed-video-bg {
                width: 85% !important;
            }

            /* Loading screen — put tagline in flex flow so bar+tagline center as a group */
            .loading-tagline {
                position: static;
                margin-top: 1.5rem;
                font-size: clamp(0.65rem, 3.5vw, 0.9rem);
                text-align: center;
                letter-spacing: -0.05em;
            }

            /* Force all chrome visible — IntersectionObserver unreliable on mobile */
            .nav, .logo-bottom, .site-footer {
                opacity: 1 !important;
                pointer-events: auto !important;
            }

            /* Project titles: always visible, centered on mobile */
            .project-client {
                opacity: 1 !important;
                text-align: center !important;
            }
            .project-subtitle {
                opacity: 0.7 !important;
                text-align: center !important;
            }
            .project-info { text-align: center; }
        }

        /* Hide dot cursor on touch devices */
        @media (pointer: coarse) {
            .cursor { display: none !important; }
            * { cursor: auto !important; }
        }

        /* Disable blue gradient text effect on touch/mobile */
        @media (pointer: coarse) {
            .project-client.is-hovered { -webkit-text-fill-color: unset !important; color: unset !important; }
            .project-client::before { display: none !important; }
            .project-client.is-hovered::before,
            .project-client.is-animating::before { display: none !important; }
        }

        /* ==================== */
        /* DARK MODE OVERRIDES */
        /* ==================== */
        body.dark-mode {
            background-color: #0A0A0A !important;
            color: #FF4500 !important;
            -webkit-text-fill-color: #FF4500;
        }

        body.dark-mode ::selection {
            background: #FF4500 !important;
            color: #0A0A0A !important;
            -webkit-text-fill-color: #0A0A0A !important;
        }

        body.dark-mode .cursor { background: #FF4500 !important; }
        body.dark-mode .plus-icon span { background: #FF4500 !important; }

        body.dark-mode .menu-link {
            color: #FF4500 !important;
            -webkit-text-fill-color: #FF4500;
        }

        body.dark-mode .logo-bottom svg path { fill: #FF4500 !important; }
        body.dark-mode .footer { background: #0A0A0A !important; }

        body.dark-mode .footer-left,
        body.dark-mode .footer-link,
        body.dark-mode .footer-link .char {
            color: #FF4500 !important;
            -webkit-text-fill-color: #FF4500;
        }

        body.dark-mode .footer-link::after { background: #FF4500 !important; }
        body.dark-mode .social-link { color: #FF4500 !important; }

        body.dark-mode .contact-email {
            color: #FF4500 !important;
            -webkit-text-fill-color: #FF4500;
        }

        body.dark-mode .clock-row {
            color: #FF4500 !important;
            -webkit-text-fill-color: #FF4500;
        }

body.dark-mode .project-client {
            color: #FF4500 !important;
            -webkit-text-fill-color: #FF4500;
        }

        body.dark-mode .project-subtitle {
            color: #FF4500 !important;
            -webkit-text-fill-color: #FF4500;
        }

        body.dark-mode .scroll-progress-line { background: #FF4500 !important; }

        body.dark-mode .director-name {
            color: #FF4500 !important;
            -webkit-text-fill-color: #FF4500;
        }

        body.dark-mode .director-credit {
            color: #FF4500 !important;
            -webkit-text-fill-color: #FF4500;
        }

        body.dark-mode .case-study-link {
            color: #FF4500 !important;
            -webkit-text-fill-color: #FF4500;
        }

        body.dark-mode .case-study-link::after { background: #FF4500 !important; }

        body.dark-mode .hero-wordmark { filter: brightness(0) saturate(100%) invert(38%) sepia(99%) saturate(1200%) hue-rotate(358deg) brightness(103%) contrast(107%) !important; }

        /* ==================== */
        /* DARK MODE TOGGLE */
        /* ==================== */
        .dark-mode-toggle {
            display: flex;
            align-items: center;
            cursor: none;
        }

        .dark-mode-toggle input { display: none; }

        .toggle-track {
            width: 28px;
            height: 16px;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 8px;
            position: relative;
            transition: background 0.3s ease;
            cursor: none;
            display: block;
        }

        .toggle-track::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 12px;
            height: 12px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 50%;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dark-mode-toggle input:checked + .toggle-track {
            background: rgba(255, 69, 0, 0.8);
        }

        .dark-mode-toggle input:checked + .toggle-track::after {
            transform: translateX(12px);
            background: #FF4500;
        }

        /* ==================== */
        /* LOADING OVERLAY      */
        /* ==================== */
        .loading-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: var(--black);
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease;
        }
        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .loading-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            transition: opacity 0.5s ease;
        }
        .loading-content.fade-out {
            opacity: 0;
        }
        .loading-label {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.7rem;
            font-weight: 300;
            color: rgba(255,255,255,0.5);
            letter-spacing: 0.1em;
            text-transform: lowercase;
        }
        .loading-bar-track {
            width: 100px;
            height: 3px;
            background: rgba(255,255,255,0.15);
            border-radius: 1px;
            overflow: hidden;
        }
        .loading-bar-fill {
            height: 100%;
            width: 0%;
            background: var(--white);
            border-radius: 1px;
            transition: width 0.4s ease;
        }
        .loading-tagline {
            position: absolute;
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(0.6rem, 1.2vw, 1.2rem);
            font-weight: 500;
            color: var(--white);
            letter-spacing: -0.07em;
            text-align: center;
            opacity: 0;
            transition: opacity 0.6s ease;
            pointer-events: none;
        }
        .loading-tagline.visible {
            opacity: 1;
        }

        /* ==================== */
        /* GLOBAL FOOTER        */
        /* ==================== */
        .site-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1001;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        .site-footer.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .site-footer-left {
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--black);
            opacity: 0.5;
        }
        .site-footer-right {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            opacity: 0.5;
        }
        .site-footer-link {
            font-size: 0.7rem;
            color: var(--black);
            text-decoration: none;
        }
        .site-footer-socials {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .social-link {
            color: var(--black);
            display: flex;
            align-items: center;
        }
        .site-footer-social {
            display: flex;
            align-items: center;
        }
        .site-footer-social svg {
            width: 16px;
            height: 16px;
            fill: var(--black);
        }

    </style>
    <script defer src="/_vercel/speed-insights/script.js"></script>
</head>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-content" id="loadingContent">
            <p class="loading-label">loading...</p>
            <div class="loading-bar-track">
                <div class="loading-bar-fill" id="loadingBarFill"></div>
            </div>
        </div>
        <p class="loading-tagline" id="loadingTagline">relentlessly efficient.</p>
    </div>

    <!-- Custom Cursor -->
    <div class="cursor" id="cursor"></div>

    <!-- Navigation - Plus Menu -->
    <nav class="nav">
        <div class="menu-toggle" id="menuToggle">
            <div class="plus-icon">
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Menu Overlay -->
    <div class="menu-overlay" id="menuOverlay">
        <div class="menu-links">
            <a href="directors.html" class="menu-link">directors</a>
            <a href="lab.html" class="menu-link">lab</a>
            <a href="contact.html" class="menu-link">contact</a>
        </div>
    </div>

    <!-- Logo top-left — scrolls back to start -->
    <a href="#" class="logo-bottom" id="logoBottom">
        <svg viewBox="0 0 160 160" fill="none">
            <path fill="#0A0A0A" d="M48.29,31.85l22.39,22.31c3.68-3.73,8.72-6.28,13.93-7.03,16.55-2.35,30.61,11.71,28.26,28.26-.74,5.21-3.3,10.26-7.03,13.93l22.28,22.28c.05.06.03.1,0,.16-.06.12-.72.73-.88.88-8.37,8.12-19.88,13.58-31.45,15.11-35.8,4.72-66.71-24.61-63.87-60.59,1.05-13.25,6.98-25.99,16.37-35.32ZM70.61,54.25c-8.62,8.49-9.63,22.25-2.56,32.07,8.54,11.86,26.04,13.97,36.87,3.93.14-.13.75-.7.8-.8.05-.09.04-.13-.04-.2l-35.07-34.99Z"/>

    <script>
        // ==================== //
        // REFERENCES
        // ==================== //
        // Touch detection — mirrors @media (pointer: coarse) exactly
        const isTouchDevice = window.matchMedia('(pointer: coarse)').matches;

        const scrollContainer = document.getElementById('scrollContainer');
        const fixedVideoBg   = document.getElementById('fixedVideoBg');
        const logoBottom     = document.getElementById('logoBottom');
        const navEl          = document.querySelector('.nav');
        const menuToggle     = document.getElementById('menuToggle');
        const menuOverlay    = document.getElementById('menuOverlay');
        const progressLine   = document.getElementById('progressLine');
        const siteFooter     = document.querySelector('.site-footer');

        // ==================== //
        // LOGO — scroll back to start
        // ==================== //
        logoBottom.addEventListener('click', (e) => {
            e.preventDefault();
            scrollContainer.scrollTo({ left: 0, behavior: 'smooth' });
        });

        // ==================== //
        // MENU
        // ==================== //
        menuToggle.addEventListener('click', () => {
            menuToggle.classList.toggle('active');
            menuOverlay.classList.toggle('active');
        });

        menuOverlay.addEventListener('click', (e) => {
            if (e.target === menuOverlay) {
                menuToggle.classList.remove('active');
                menuOverlay.classList.remove('active');
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && menuOverlay.classList.contains('active')) {
                menuToggle.classList.remove('active');
                menuOverlay.classList.remove('active');
            }
        });

        // ==================== //
        // MENU LINK GRADIENT SPREAD (desktop only)
        // ==================== //
        document.querySelectorAll('.menu-link').forEach(link => {
            const gradient = document.createElement('span');
            gradient.classList.add('menu-link-gradient');
            gradient.textContent = link.textContent;
            gradient.style.setProperty('--spread', '0%');
            link.appendChild(gradient);

            if (isTouchDevice) return; // no hover on touch

            let af;

            link.addEventListener('mouseenter', (e) => {
                const rect = link.getBoundingClientRect();
                gradient.style.setProperty('--mx', (e.clientX - rect.left) + 'px');
                gradient.style.setProperty('--my', (e.clientY - rect.top) + 'px');
                gradient.style.setProperty('--spread', '0%');
                let t0 = null;
                const run = (ts) => {
                    if (!t0) t0 = ts;
                    const p = Math.min((ts - t0) / 900, 1);
                    gradient.style.setProperty('--spread', (( 1 - Math.pow(1 - p, 3)) * 200) + '%');
                    if (p < 1) af = requestAnimationFrame(run);
                };
                cancelAnimationFrame(af);
                af = requestAnimationFrame(run);
            });

            link.addEventListener('mouseleave', () => {
                cancelAnimationFrame(af);
                const cur = parseFloat(gradient.style.getPropertyValue('--spread')) || 200;
                let t0 = null;
                const run = (ts) => {
                    if (!t0) t0 = ts;
                    const p = Math.min((ts - t0) / 500, 1);
                    gradient.style.setProperty('--spread', (cur * (1 - (1 - Math.pow(1 - p, 3)))) + '%');
                    if (p < 1) af = requestAnimationFrame(run);
                };
                af = requestAnimationFrame(run);
            });
        });

        // ==================== //
        // PROJECT TITLE RADIAL HOVER (desktop only)
        // ==================== //
        document.querySelectorAll('.project-client').forEach(title => {
            title.setAttribute('data-text', title.textContent.trim());
            if (isTouchDevice) return; // skip hover effect on touch screens

            title.addEventListener('mouseenter', (e) => {
                title.classList.add('is-hovered');
                const rect = title.getBoundingClientRect();
                title.style.setProperty('--mx', (e.clientX - rect.left) + 'px');
                title.style.setProperty('--my', (e.clientY - rect.top) + 'px');
                title.style.setProperty('--spread', '0%');
                let t0 = null;
                const run = (ts) => {
                    if (!t0) t0 = ts;
                    const p = Math.min((ts - t0) / 1400, 1);
                    title.style.setProperty('--spread', ((1 - Math.pow(1 - p, 3)) * 200) + '%');
                    if (p < 1) title._af = requestAnimationFrame(run);
                };
                cancelAnimationFrame(title._af);
                title._af = requestAnimationFrame(run);
            });

            title.addEventListener('mouseleave', () => {
                cancelAnimationFrame(title._af);
                // Immediately restore white parent text; keep ::before visible for retract
                title.classList.remove('is-hovered');
                title.classList.add('is-animating');
                const cur = parseFloat(title.style.getPropertyValue('--spread')) || 200;
                let t0 = null;
                const run = (ts) => {
                    if (!t0) t0 = ts;
                    const p = Math.min((ts - t0) / 600, 1);
                    title.style.setProperty('--spread', (cur * (1 - (1 - Math.pow(1 - p, 3)))) + '%');
                    if (p < 1) {
                        title._af = requestAnimationFrame(run);
                    } else {
                        title.classList.remove('is-animating');
                    }
                };
                title._af = requestAnimationFrame(run);
            });
        });

        // ==================== //
        // CUSTOM CURSOR
        // ==================== //
        const cursor = document.getElementById('cursor');
        let mouseX = 0, mouseY = 0, cursorX = 0, cursorY = 0;
        let cursorScale = 1;
        window._cursorTargetScale = 1; // shared with other script blocks

        // Re-enforce cursor:none on bfcache restore (back/forward navigation)
        window.addEventListener('pageshow', function() {
            document.documentElement.style.setProperty('cursor', 'none', 'important');
            document.body.style.setProperty('cursor', 'none', 'important');
            const sc = document.getElementById('scrollContainer');
            if (sc) sc.style.setProperty('cursor', 'none', 'important');
        });

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        (function animateCursor() {
            cursorX += (mouseX - cursorX) * 0.5;
            cursorY += (mouseY - cursorY) * 0.5;
            cursorScale += (window._cursorTargetScale - cursorScale) * 0.15;
            // transform is GPU-composited in Safari — much faster than left/top
            cursor.style.transform = `translate(${cursorX - 5}px, ${cursorY - 5}px) scale(${cursorScale})`;
            requestAnimationFrame(animateCursor);
        })();

        // ==================== //
        // WHEEL → HORIZONTAL NAV
        // Vertical trackpad scroll drives horizontal panel changes
        // Lock releases only after scrolling fully stops (not a fixed timer)
        // ==================== //
        let wheelDelta = 0;
        let wheelTimer = null;
        let isWheelScrolling = false;
        let scrollEndTimer = null;
        const WHEEL_THRESHOLD = 20;

        // Release lock once the container stops scrolling (200ms after last scroll event)
        // Also clean up any hover states that got stuck during scroll
        scrollContainer.addEventListener('scroll', () => {
            document.querySelectorAll('.project-client.is-hovered, .project-client.is-animating').forEach(el => {
                cancelAnimationFrame(el._af);
                el.classList.remove('is-hovered', 'is-animating');
            });

            if (isWheelScrolling) {
                clearTimeout(scrollEndTimer);
                scrollEndTimer = setTimeout(() => {
                    isWheelScrolling = false;
                    wheelDelta = 0;
                }, 200);
            }
        });

        window.addEventListener('wheel', (e) => {
            e.preventDefault();
            if (isWheelScrolling) return;

            wheelDelta += e.deltaY;
            clearTimeout(wheelTimer);
            wheelTimer = setTimeout(() => { wheelDelta = 0; }, 300);

            const maxLeft = scrollContainer.scrollWidth - scrollContainer.clientWidth;

            if (wheelDelta > WHEEL_THRESHOLD) {
                wheelDelta = 0;
                if (scrollContainer.scrollLeft >= maxLeft - 1) return; // already at right edge
                isWheelScrolling = true;
                scrollContainer.scrollBy({ left: window.innerWidth, behavior: 'smooth' });
            } else if (wheelDelta < -WHEEL_THRESHOLD) {
                wheelDelta = 0;
                if (scrollContainer.scrollLeft <= 1) return; // already at left edge
                isWheelScrolling = true;
                scrollContainer.scrollBy({ left: -window.innerWidth, behavior: 'smooth' });
            }
        }, { passive: false });

        // ==================== //
        // KEYBOARD NAV (horizontal)
        // ==================== //
        document.addEventListener('keydown', (e) => {
            if (menuOverlay.classList.contains('active')) return;
            if (e.key === 'ArrowRight' || e.key === 'PageDown') {
                e.preventDefault();
                scrollContainer.scrollBy({ left: window.innerWidth, behavior: 'smooth' });
            } else if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
                e.preventDefault();
                scrollContainer.scrollBy({ left: -window.innerWidth, behavior: 'smooth' });
            }
        });

        // ==================== //
        // PARALLAX TEXT (project-info sweeps in from scroll direction)
        // ==================== //
        const projectSections = document.querySelectorAll('.project-section');

        function updateParallax() {
            const scrollLeft = scrollContainer.scrollLeft;
            const vw = window.innerWidth;
            projectSections.forEach(section => {
                const panelLeft = section.offsetLeft;
                // Distance from viewport left edge: positive = to the right, negative = to the left
                const offset = panelLeft - scrollLeft;
                const info = section.querySelector('.project-info');
                if (info) {
                    if (window.innerWidth <= 768) {
                        info.style.transform = 'translateY(-50%)';
                    } else {
                        // Parallax factor: text moves at 65% of scroll speed
                        const tx = offset * 0.65;
                        info.style.transform = `translateY(-50%) translateX(${tx}px)`;
                    }
                }
            });
        }

        scrollContainer.addEventListener('scroll', updateParallax, { passive: true });
        window.addEventListener('resize', updateParallax);
        updateParallax(); // set initial positions

        // ==================== //
        // INTERSECTION OBSERVER (8 panels)
        // ==================== //
        const allSectionIds = [
            'heroSection',
            'project1', 'project2', 'project3', 'project4',
            'project5', 'project6', 'project7'
        ];

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const id = entry.target.id;

                if (entry.isIntersecting && entry.intersectionRatio >= 0.5) {
                    const idx = allSectionIds.indexOf(id);

                    // Progress line — grows from center outward each panel
                    const pct  = idx / (allSectionIds.length - 1) * 100;
                    const half = pct / 2;
                    progressLine.style.left  = (50 - half) + '%';
                    progressLine.style.right = (50 - half) + '%';

                    // Logo + nav: hidden on hero, visible on projects
                    const onHero = id === 'heroSection';
                    logoBottom.classList.toggle('visible', !onHero);
                    navEl.classList.toggle('visible', !onHero);
                    siteFooter.classList.toggle('visible', !onHero);

                    // Hero reel: show on hero panel only
                    fixedVideoBg.style.opacity = onHero ? '1' : '0';

                    // Project in-view class
                    if (id.startsWith('project')) {
                        entry.target.classList.add('in-view');
                    }
                } else if (!entry.isIntersecting) {
                    if (id.startsWith('project')) {
                        entry.target.classList.remove('in-view');
                    }
                }
            });
        }, {
            root: scrollContainer,
            threshold: 0.5
        });

        allSectionIds.forEach(id => {
            const el = document.getElementById(id);
            if (el) observer.observe(el);
        });

        // ==================== //
        // PROJECT ANIMATIONS (Motion)
        // ==================== //
        const { animate, inView } = Motion;

        document.querySelectorAll('.project-section').forEach((section) => {
            const client   = section.querySelector('.project-client');
            const subtitle = section.querySelector('.project-subtitle');

            inView(section, () => {
                if (client)   animate(client,   { opacity: [0, 1]   }, { duration: 0.7, easing: [0.22, 1, 0.36, 1] });
                if (subtitle) animate(subtitle, { opacity: [0, 0.7] }, { duration: 0.7, delay: 0.12, easing: [0.22, 1, 0.36, 1] });

                return () => {
                    if (client)   animate(client,   { opacity: 0 }, { duration: 0.3 });
                    if (subtitle) animate(subtitle, { opacity: 0 }, { duration: 0.3 });
                };
            }, { amount: 0.5 });
        });
    </script>

    <script>
    // ==================== //
    // ==================== //
    // MOBILE: fix video dimensions
    // ==================== //
    function fixMobileVideos() {
        if (window.innerWidth > 768) return;
        // Use the section's actual rendered height for pixel accuracy
        const h = document.querySelector('.project-section')
                    ? document.querySelector('.project-section').offsetHeight
                    : window.innerHeight;
        const w = Math.ceil(h * 16 / 9) + 2;
        document.querySelectorAll('.project-video-container iframe, .fixed-video-bg iframe').forEach(function(iframe) {
            iframe.style.width     = w + 'px';
            iframe.style.height    = h + 'px';
            iframe.style.minWidth  = 'unset';
            iframe.style.minHeight = 'unset';
            // Reset any per-iframe inline transform so CSS centering takes over
            iframe.style.transform = 'translate(-50%, -50%)';
        });
    }
    fixMobileVideos();
    window.addEventListener('resize', fixMobileVideos);

    // ==================== //
    // LAZY LOADER
    // Iframes with data-src load only when their section nears the viewport.
    // ==================== //
    (function() {
        const sc = document.getElementById('scrollContainer');
        const lazyObserver = new IntersectionObserver(function(entries) {
            entries.forEach(function(entry) {
                if (!entry.isIntersecting) return;
                const iframe = entry.target.querySelector('iframe[data-src]');
                if (iframe) {
                    iframe.src = iframe.dataset.src;
                    iframe.removeAttribute('data-src');
                }
                lazyObserver.unobserve(entry.target);
            });
        }, { root: sc, rootMargin: '0px 200% 0px 200%', threshold: 0 });

        document.querySelectorAll('.project-section').forEach(function(section) {
            if (section.querySelector('iframe[data-src]')) {
                lazyObserver.observe(section);
            }
        });
    })();

    // ==================== //
    // LOADING SCREEN
    // Waits for the hero video to actually start playing (via Vimeo postMessage)
    // before dismissing. Falls back after 5s if postMessage never fires.
    // ==================== //
    (function() {
        const overlay    = document.getElementById('loadingOverlay');
        const barFill    = document.getElementById('loadingBarFill');
        const content    = document.getElementById('loadingContent');
        const tagline    = document.getElementById('loadingTagline');
        // Only the two eager iframes (hero bg + wabi) are tracked for progress
        const eagerIframes = document.querySelectorAll('iframe[src*="vimeo"]');
        const total      = eagerIframes.length;
        let iframesLoaded = 0;
        let videoStarted  = false;
        let completed     = false;

        // Skip loading screen on return visits within the same session
        if (sessionStorage.getItem('covalent_visited')) {
            overlay.style.display = 'none';
            return;
        }
        sessionStorage.setItem('covalent_visited', '1');

        function setProgress(pct) {
            barFill.style.width = pct + '%';
        }

        function runSequence() {
            if (completed) return;
            completed = true;
            setProgress(100);
            setTimeout(() => {
                content.classList.add('fade-out');
                setTimeout(() => {
                    tagline.classList.add('visible');
                    setTimeout(() => {
                        tagline.classList.remove('visible');
                        setTimeout(() => { overlay.classList.add('hidden'); }, 700);
                    }, 1500);
                }, 500);
            }, 400);
        }

        function checkReady() {
            if (iframesLoaded >= total && videoStarted) runSequence();
        }

        // Track iframe HTML loads for progress bar (fills to 80%)
        eagerIframes.forEach(function(iframe) {
            iframe.addEventListener('load', function() {
                iframesLoaded++;
                setProgress(Math.round((iframesLoaded / total) * 80));
                checkReady();
            });
        });

        // Vimeo postMessage: subscribe to play event on ready, dismiss when play fires
        window.addEventListener('message', function(e) {
            if (e.origin !== 'https://player.vimeo.com') return;
            try {
                const data = JSON.parse(e.data);
                if (data.event === 'ready') {
                    eagerIframes.forEach(function(iframe) {
                        if (iframe.contentWindow) {
                            iframe.contentWindow.postMessage(
                                JSON.stringify({ method: 'addEventListener', value: 'play' }),
                                'https://player.vimeo.com'
                            );
                        }
                    });
                }
                if (data.event === 'play' && !videoStarted) {
                    videoStarted = true;
                    setProgress(100);
                    checkReady();
                }
            } catch(err) {}
        });

        // Fallback: if Vimeo play event never fires, proceed after 5s
        setTimeout(function() {
            if (!videoStarted) { videoStarted = true; checkReady(); }
        }, 5000);

        // Hard fallback: 10s max
        setTimeout(function() {
            if (!completed) runSequence();
        }, 10000);
    })();
