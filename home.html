<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta property="og:description" content="a modern production company.">

    <meta property="og:url" content="https://covalentstudios.co">

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* CSS Variables */
        :root {
            --ice: #FAFBFC;
            --bond-blue: #5979e9;
            --black: #0A0A0A;
            --gray: #6B7280;
            --white: #FFFFFF;
        }

        /* Reset */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none !important;
        }

        ::selection {
            background: var(--black);
            color: var(--white);
            -webkit-text-fill-color: var(--white);
        }

        html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
        }

        /* Body — no scroll, scroll container handles it */
        body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--black);
            color: var(--white);
            letter-spacing: -0.07em;
        }

        /* ==================== */
        /* HORIZONTAL SCROLL CONTAINER */
        /* ==================== */
        .scroll-container {
            display: flex;
            flex-direction: row;
            overflow-x: scroll;
            overflow-y: hidden;
            width: 100vw;
            height: 100vh;
            scroll-snap-type: x mandatory;
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* IE/Edge */
        }

        .scroll-container::-webkit-scrollbar {
            display: none; /* Chrome, Safari */
        }

        /* Custom Cursor */
        .cursor {
            position: fixed;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--white);
            pointer-events: none;
            z-index: 10001;
            mix-blend-mode: difference;
            transform: translate(-50%, -50%);
        }

        /* Navigation - Plus Menu */
        .nav {
            position: fixed;
            top: 0;
            right: 0;
            padding: 2rem;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
        }

        .nav.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .menu-toggle {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .menu-toggle.active {
            transform: rotate(45deg);
        }

        .plus-icon {
            width: 22px;
            height: 22px;
            position: relative;
        }

        .plus-icon span {
            display: block;
            position: absolute;
            width: 100%;
            height: 2px;
            background: var(--white);
            top: 50%;
            left: 0;
            transition: all 0.3s ease;
        }

        .plus-icon span:first-child {
            transform: translateY(-50%) rotate(90deg);
        }

        .plus-icon span:last-child {
            transform: translateY(-50%);
        }

        /* Expanded Menu */
        .menu-overlay {
            position: fixed;
            top: 0;
            right: 0;
            width: 100%;
            height: 100%;
            z-index: 999;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: flex-end;
            padding: 7rem 3rem 3rem;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .menu-overlay.active {
            pointer-events: auto;
            opacity: 1;
        }

        .menu-links {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .menu-link {
            font-size: clamp(1rem, 1.8vw, 1.5rem);
            font-weight: 500;
            color: var(--white);
            text-decoration: none;
            opacity: 0;
            transform: translateX(30px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: -0.07em;
            line-height: 1.1;
            position: relative;
            display: inline-block;
        }

        .menu-overlay.active .menu-link {
            opacity: 0.6;
            transform: translateX(0);
        }

        .menu-overlay.active .menu-link:nth-child(1) { transition-delay: 0.05s; }
        .menu-overlay.active .menu-link:nth-child(2) { transition-delay: 0.1s; }

        .menu-link:hover {
            opacity: 1 !important;
        }

        .menu-link-gradient {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #5979e9, #7B93FF, #5979e9, #3A5BD4);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 3s ease infinite;
            pointer-events: none;
            -webkit-mask-image: radial-gradient(circle at var(--mx, 0px) var(--my, 0px), black var(--spread, 0%), transparent var(--spread, 0%));
            mask-image: radial-gradient(circle at var(--mx, 0px) var(--my, 0px), black var(--spread, 0%), transparent var(--spread, 0%));
            opacity: 0;
            transition: opacity 0s;
        }

        .menu-link:hover .menu-link-gradient {
            opacity: 1;
        }

        .menu-link.current {
            opacity: 1 !important;
        }

        /* Logo top-left */
        .logo-bottom {
            position: fixed;
            top: 2rem;
            left: 2rem;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
        }

        .logo-bottom.visible {
            opacity: 1;
            pointer-events: auto;
        }

        .logo-bottom svg {
            width: 40px;
            height: 40px;
        }

        /* Scroll Progress Indicator — horizontal, bottom-center */
        .scroll-progress {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: row;
            gap: 8px;
        }

        .scroll-progress-segment {
            width: 24px;
            height: 3px;
            background: var(--white);
            opacity: 0.2;
            transition: opacity 0.3s ease;
            border-radius: 2px;
        }

        .scroll-progress-segment.active {
            opacity: 1;
        }

        /* ==================== */
        /* FIXED BACKGROUND VIDEO (hero + about panels) */
        /* ==================== */
        .fixed-video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            background: var(--black);
            transition: opacity 0.6s ease;
        }

        .fixed-video-bg iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scale(1.05);
            transform-origin: center center;
            border: none;
            pointer-events: none;
        }

        /* ==================== */
        /* HERO SECTION — logo only */
        /* ==================== */
        .hero-section {
            position: relative;
            min-width: 100vw;
            height: 100vh;
            flex-shrink: 0;
            scroll-snap-align: start;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        /* Large centered logomark */
        .hero-logo {
            position: relative;
            z-index: 10;
            width: clamp(50px, 7.5vw, 100px);
            height: clamp(50px, 7.5vw, 100px);
        }

        .hero-logo svg {
            width: 100%;
            height: 100%;
        }

        /* ==================== */
        /* ABOUT SECTION — tagline panel */
        /* ==================== */
        .about-section {
            position: relative;
            min-width: 100vw;
            height: 100vh;
            flex-shrink: 0;
            scroll-snap-align: start;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        /* Tagline — slides in from right */
        .about-text {
            font-size: clamp(1.5rem, 5vw, 5rem);
            font-weight: 300;
            text-transform: lowercase;
            letter-spacing: -0.07em;
            line-height: 1.2;
            color: var(--white);
            text-align: center;
            margin: 0;
            position: relative;
            z-index: 10;
            opacity: 0;
            transform: translateX(60px);
            transition: opacity 0.8s cubic-bezier(0.22, 1, 0.36, 1),
                        transform 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .about-text.visible {
            opacity: 1;
            transform: translateX(0);
        }

        /* ==================== */
        /* PROJECT SECTIONS */
        /* ==================== */
        .project-section {
            position: relative;
            min-width: 100vw;
            height: 100vh;
            flex-shrink: 0;
            scroll-snap-align: start;
            z-index: 2;
            background: var(--black);
            overflow: hidden;
        }

        .project-video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            will-change: transform;
        }

        .project-video-container iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: 177.78vh; /* 16:9 */
            height: 56.25vw; /* 16:9 */
            transform: translate(-50%, -50%) scale(1.3);
            border: none;
            pointer-events: none;
        }

        /* Text overlay — vertically centered, left side */
        .project-info {
            position: absolute;
            top: 50%;
            left: 5rem;
            transform: translateY(-50%);
            z-index: 10;
        }

        .project-client-link {
            text-decoration: none;
            color: inherit;
        }

        .project-client {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(3.5rem, 7vw, 7rem);
            font-weight: 700;
            color: var(--white);
            line-height: 1;
            letter-spacing: -0.07em;
            text-transform: lowercase;
            margin: 0;
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1),
                        transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            display: inline-block;
        }

        .project-client::before {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            right: -0.15em;
            bottom: -0.15em;
            background: linear-gradient(90deg, #5979e9, #7B93FF, #5979e9, #3A5BD4);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 3s ease infinite;
            pointer-events: none;
            -webkit-mask-image: radial-gradient(circle at var(--mx, 0px) var(--my, 0px), black var(--spread, 0%), transparent var(--spread, 0%));
            mask-image: radial-gradient(circle at var(--mx, 0px) var(--my, 0px), black var(--spread, 0%), transparent var(--spread, 0%));
        }

        .project-subtitle {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(1rem, 2vw, 1.5rem);
            font-weight: 300;
            color: var(--white);
            opacity: 0;
            line-height: 1.3;
            letter-spacing: -0.07em;
            text-transform: lowercase;
            margin: 0.05em 0 0 0;
            transform: translateY(20px);
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1) 0.1s,
                        transform 0.6s cubic-bezier(0.4, 0, 0.2, 1) 0.1s;
        }

        /* When section is in view, animate text in */
        .project-section.in-view .project-client {
            opacity: 1;
            transform: translateY(0);
        }

        .project-section.in-view .project-subtitle {
            opacity: 0.7;
            transform: translateY(0);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .nav { padding: 1.5rem; }
            .logo-bottom { top: 1.5rem; left: 1.5rem; }
            .scroll-progress { bottom: 1.5rem; }
            .menu-overlay { padding: 6rem 2.5rem 2.5rem; }
            .project-info { left: 3rem; }
        }

        @media (max-width: 768px) {
            .nav { padding: 1.5rem; }
            .logo-bottom { top: 1.5rem; left: 1.5rem; }
            .logo-bottom svg { width: 32px; height: 32px; }
            .scroll-progress { bottom: 1.5rem; }
            .menu-overlay { padding: 5rem 1.5rem 1.5rem; }
            .project-info { left: 1.5rem; }
        }

        /* ==================== */
        /* DARK MODE OVERRIDES */
        /* ==================== */
        body.dark-mode {
            background-color: #0A0A0A !important;
            color: #FF4500 !important;
            -webkit-text-fill-color: #FF4500;
        }

        body.dark-mode ::selection {
            background: #FF4500 !important;
            color: #0A0A0A !important;
            -webkit-text-fill-color: #0A0A0A !important;
        }

        body.dark-mode .cursor { background: #FF4500 !important; }
        body.dark-mode .plus-icon span { background: #FF4500 !important; }

        body.dark-mode .menu-link {
            color: #FF4500 !important;
            -webkit-text-fill-color: #FF4500;
        }

        body.dark-mode .logo-bottom svg path { fill: #FF4500 !important; }
        body.dark-mode .footer { background: #0A0A0A !important; }

        body.dark-mode .footer-left,
        body.dark-mode .footer-link,
        body.dark-mode .footer-link .char {
            color: #FF4500 !important;
            -webkit-text-fill-color: #FF4500;
        }

        body.dark-mode .footer-link::after { background: #FF4500 !important; }
        body.dark-mode .social-link svg { fill: #FF4500 !important; }

        body.dark-mode .contact-email {
            color: #FF4500 !important;
            -webkit-text-fill-color: #FF4500;
        }

        body.dark-mode .clock-row {
            color: #FF4500 !important;
            -webkit-text-fill-color: #FF4500;
        }

        body.dark-mode .about-text {
            color: #FF4500 !important;
            -webkit-text-fill-color: #FF4500;
        }

        body.dark-mode .project-client {
            color: #FF4500 !important;
            -webkit-text-fill-color: #FF4500;
        }

        body.dark-mode .project-subtitle {
            color: #FF4500 !important;
            -webkit-text-fill-color: #FF4500;
        }

        body.dark-mode .scroll-progress-segment { background: #FF4500 !important; }

        body.dark-mode .director-name {
            color: #FF4500 !important;
            -webkit-text-fill-color: #FF4500;
        }

        body.dark-mode .director-credit {
            color: #FF4500 !important;
            -webkit-text-fill-color: #FF4500;
        }

        body.dark-mode .case-study-link {
            color: #FF4500 !important;
            -webkit-text-fill-color: #FF4500;
        }

        body.dark-mode .case-study-link::after { background: #FF4500 !important; }

        body.dark-mode .hero-logo svg path { fill: #FF4500 !important; }

        /* ==================== */
        /* DARK MODE TOGGLE */
        /* ==================== */
        .dark-mode-toggle {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 10000;
            cursor: none;
        }

        .dark-mode-toggle input { display: none; }

        .toggle-track {
            width: 36px;
            height: 18px;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 9px;
            position: relative;
            transition: background 0.3s ease;
            cursor: none;
            display: block;
        }

        .toggle-track::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 14px;
            height: 14px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dark-mode-toggle input:checked + .toggle-track {
            background: rgba(255, 69, 0, 0.8);
        }

        .dark-mode-toggle input:checked + .toggle-track::after {
            transform: translateX(18px);
            background: #FF4500;
        }

        /* Page loading gate */
        body:not(.page-ready) { opacity: 0; }
        body.page-ready { opacity: 1; transition: opacity 0.3s ease; }

    </style>
</head>

    <!-- Motion library -->
    <script src="https://cdn.jsdelivr.net/npm/motion@12.34.0/dist/motion.js"></script>

    <script>
        // ==================== //
        // REFERENCES
        // ==================== //
        const scrollContainer = document.getElementById('scrollContainer');
        const fixedVideoBg   = document.getElementById('fixedVideoBg');
        const logoBottom     = document.getElementById('logoBottom');
        const navEl          = document.querySelector('.nav');
        const menuToggle     = document.getElementById('menuToggle');
        const menuOverlay    = document.getElementById('menuOverlay');
        const progressSegs   = document.querySelectorAll('.scroll-progress-segment');
        const aboutText      = document.getElementById('aboutText');

        // ==================== //
        // LOGO — scroll back to start
        // ==================== //
        logoBottom.addEventListener('click', (e) => {
            e.preventDefault();
            scrollContainer.scrollTo({ left: 0, behavior: 'smooth' });
        });

        // ==================== //
        // MENU
        // ==================== //
        menuToggle.addEventListener('click', () => {
            menuToggle.classList.toggle('active');
            menuOverlay.classList.toggle('active');
        });

        menuOverlay.addEventListener('click', (e) => {
            if (e.target === menuOverlay) {
                menuToggle.classList.remove('active');
                menuOverlay.classList.remove('active');
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && menuOverlay.classList.contains('active')) {
                menuToggle.classList.remove('active');
                menuOverlay.classList.remove('active');
            }
        });

        // ==================== //
        // MENU LINK GRADIENT SPREAD
        // ==================== //
        document.querySelectorAll('.menu-link').forEach(link => {
            const gradient = document.createElement('span');
            gradient.classList.add('menu-link-gradient');
            gradient.textContent = link.textContent;
            gradient.style.setProperty('--spread', '0%');
            link.appendChild(gradient);

            let af;

            link.addEventListener('mouseenter', (e) => {
                const rect = link.getBoundingClientRect();
                gradient.style.setProperty('--mx', (e.clientX - rect.left) + 'px');
                gradient.style.setProperty('--my', (e.clientY - rect.top) + 'px');
                gradient.style.setProperty('--spread', '0%');
                let t0 = null;
                const run = (ts) => {
                    if (!t0) t0 = ts;
                    const p = Math.min((ts - t0) / 900, 1);
                    gradient.style.setProperty('--spread', (( 1 - Math.pow(1 - p, 3)) * 200) + '%');
                    if (p < 1) af = requestAnimationFrame(run);
                };
                cancelAnimationFrame(af);
                af = requestAnimationFrame(run);
            });

            link.addEventListener('mouseleave', () => {
                cancelAnimationFrame(af);
                const cur = parseFloat(gradient.style.getPropertyValue('--spread')) || 200;
                let t0 = null;
                const run = (ts) => {
                    if (!t0) t0 = ts;
                    const p = Math.min((ts - t0) / 500, 1);
                    gradient.style.setProperty('--spread', (cur * (1 - (1 - Math.pow(1 - p, 3)))) + '%');
                    if (p < 1) af = requestAnimationFrame(run);
                };
                af = requestAnimationFrame(run);
            });
        });

        // ==================== //
        // PROJECT TITLE GRADIENT SPREAD
        // ==================== //
        let isScrolling = false;
        let scrollTimer;
        scrollContainer.addEventListener('scroll', () => {
            isScrolling = true;
            clearTimeout(scrollTimer);
            scrollTimer = setTimeout(() => { isScrolling = false; }, 200);
        }, { passive: true });

        document.querySelectorAll('.project-client').forEach(title => {
            title.setAttribute('data-text', title.textContent);
            let af;

            title.addEventListener('mouseenter', (e) => {
                if (isScrolling) return;
                const rect = title.getBoundingClientRect();
                title.style.setProperty('--mx', (e.clientX - rect.left) + 'px');
                title.style.setProperty('--my', (e.clientY - rect.top) + 'px');
                title.style.setProperty('--spread', '0%');
                let t0 = null;
                const run = (ts) => {
                    if (!t0) t0 = ts;
                    const p = Math.min((ts - t0) / 1400, 1);
                    title.style.setProperty('--spread', ((1 - Math.pow(1 - p, 3)) * 200) + '%');
                    if (p < 1) af = requestAnimationFrame(run);
                };
                cancelAnimationFrame(af);
                af = requestAnimationFrame(run);
            });

            title.addEventListener('mouseleave', () => {
                cancelAnimationFrame(af);
                const cur = parseFloat(title.style.getPropertyValue('--spread')) || 200;
                let t0 = null;
                const run = (ts) => {
                    if (!t0) t0 = ts;
                    const p = Math.min((ts - t0) / 700, 1);
                    title.style.setProperty('--spread', (cur * (1 - (1 - Math.pow(1 - p, 3)))) + '%');
                    if (p < 1) af = requestAnimationFrame(run);
                };
                af = requestAnimationFrame(run);
            });
        });

        // ==================== //
        // CUSTOM CURSOR
        // ==================== //
        const cursor = document.getElementById('cursor');
        let mouseX = 0, mouseY = 0, cursorX = 0, cursorY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        (function animateCursor() {
            cursorX += (mouseX - cursorX) * 0.35;
            cursorY += (mouseY - cursorY) * 0.35;
            cursor.style.left = cursorX + 'px';
            cursor.style.top  = cursorY + 'px';
            requestAnimationFrame(animateCursor);
        })();

        // ==================== //
        // WHEEL → HORIZONTAL NAV
        // Vertical trackpad scroll drives horizontal panel changes
        // ==================== //
        let wheelDelta = 0;
        let wheelTimer = null;
        let isWheelScrolling = false;
        const WHEEL_THRESHOLD = 60;

        window.addEventListener('wheel', (e) => {
            e.preventDefault();
            if (isWheelScrolling) return;

            wheelDelta += e.deltaY;
            clearTimeout(wheelTimer);
            wheelTimer = setTimeout(() => { wheelDelta = 0; }, 300);

            if (wheelDelta > WHEEL_THRESHOLD) {
                isWheelScrolling = true;
                wheelDelta = 0;
                scrollContainer.scrollBy({ left: window.innerWidth, behavior: 'smooth' });
                setTimeout(() => { isWheelScrolling = false; }, 800);
            } else if (wheelDelta < -WHEEL_THRESHOLD) {
                isWheelScrolling = true;
                wheelDelta = 0;
                scrollContainer.scrollBy({ left: -window.innerWidth, behavior: 'smooth' });
                setTimeout(() => { isWheelScrolling = false; }, 800);
            }
        }, { passive: false });

        // ==================== //
        // KEYBOARD NAV (horizontal)
        // ==================== //
        document.addEventListener('keydown', (e) => {
            if (menuOverlay.classList.contains('active')) return;
            if (e.key === 'ArrowRight' || e.key === 'PageDown') {
                e.preventDefault();
                scrollContainer.scrollBy({ left: window.innerWidth, behavior: 'smooth' });
            } else if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
                e.preventDefault();
                scrollContainer.scrollBy({ left: -window.innerWidth, behavior: 'smooth' });
            }
        });

        // ==================== //
        // PROGRESS DOT CLICKS
        // ==================== //
        progressSegs.forEach((dot, i) => {
            dot.addEventListener('click', () => {
                scrollContainer.scrollTo({ left: i * window.innerWidth, behavior: 'smooth' });
            });
        });

        // ==================== //
        // INTERSECTION OBSERVER (8 panels)
        // ==================== //
        const allSectionIds = [
            'heroSection', 'aboutSection',
            'project1', 'project2', 'project3', 'project4',
            'project5', 'project6', 'project7'
        ];

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const id = entry.target.id;

                if (entry.isIntersecting && entry.intersectionRatio >= 0.5) {
                    const idx = allSectionIds.indexOf(id);

                    // Progress dots
                    progressSegs.forEach((seg, i) => seg.classList.toggle('active', i === idx));

                    // Logo + nav: hidden on hero + about, visible on projects
                    const onIntro = id === 'heroSection' || id === 'aboutSection';
                    logoBottom.classList.toggle('visible', !onIntro);
                    navEl.classList.toggle('visible', !onIntro);

                    // Hero reel: show on hero + about panels
                    fixedVideoBg.style.opacity = onIntro ? '1' : '0';

                    // Tagline: slide in when about panel is active
                    aboutText.classList.toggle('visible', id === 'aboutSection');

                    // Project in-view class
                    if (id.startsWith('project')) {
                        entry.target.classList.add('in-view');
                    }
                } else if (!entry.isIntersecting) {
                    if (id.startsWith('project')) {
                        entry.target.classList.remove('in-view');
                    }
                }
            });
        }, {
            root: scrollContainer,
            threshold: 0.5
        });

        allSectionIds.forEach(id => {
            const el = document.getElementById(id);
            if (el) observer.observe(el);
        });

        // ==================== //
        // PROJECT ANIMATIONS (Motion)
        // ==================== //
        const { animate, inView } = Motion;

        document.querySelectorAll('.project-section').forEach((section) => {
            const client   = section.querySelector('.project-client');
            const subtitle = section.querySelector('.project-subtitle');

            inView(section, () => {
                if (client)   animate(client,   { opacity: [0, 1],   y: [30, 0] }, { duration: 0.7, easing: [0.22, 1, 0.36, 1] });
                if (subtitle) animate(subtitle, { opacity: [0, 0.7], y: [20, 0] }, { duration: 0.7, delay: 0.12, easing: [0.22, 1, 0.36, 1] });

                return () => {
                    if (client)   animate(client,   { opacity: 0, y: 30 }, { duration: 0.3 });
                    if (subtitle) animate(subtitle, { opacity: 0, y: 20 }, { duration: 0.3 });
                };
            }, { amount: 0.5 });
        });
    </script>

    <!-- Dark Mode Toggle -->
    <label class="dark-mode-toggle">
        <input type="checkbox" id="darkModeToggle">
        <span class="toggle-track"></span>
    </label>

    <script>
        (function() {
            const toggle = document.getElementById('darkModeToggle');
            if (localStorage.getItem('darkMode') === 'true') {
                document.body.classList.add('dark-mode');
                toggle.checked = true;
            }
            toggle.addEventListener('change', () => {
                document.body.classList.toggle('dark-mode');
                localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
            });

            // Cursor inflate on toggle hover
            const cursorEl = document.getElementById('cursor');
            const label = document.querySelector('.dark-mode-toggle');
            label.addEventListener('mouseenter', () => {
                cursorEl.style.transform = 'translate(-50%, -50%) scale(1.8)';
                cursorEl.style.transition = 'transform 0.2s ease, left 0s, top 0s';
            });
            label.addEventListener('mouseleave', () => {
                cursorEl.style.transform = 'translate(-50%, -50%) scale(1)';
                cursorEl.style.transition = 'transform 0.2s ease, left 0s, top 0s';
            });
        })();
    </script>

    <script>
    // Page loading gate — show after first Vimeo iframe loads (4s fallback)
    (function() {
        var shown = false;
        function showPage() {
            if (shown) return;
            shown = true;
            document.body.classList.add('page-ready');
        }
        var vimeoIframe = document.querySelector('iframe[src*="vimeo"]');
        if (vimeoIframe) {
            vimeoIframe.addEventListener('load', showPage);
            setTimeout(showPage, 4000);
        } else {
            showPage();
        }
    })();
    </script>
