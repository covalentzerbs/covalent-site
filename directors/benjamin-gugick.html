    <script>
    (function populatePage() {
        var D = window.DIRECTOR;
        document.getElementById('heroName').textContent    = D.name;
        document.getElementById('heroTagline').textContent = D.tagline;
        document.getElementById('bioShort').textContent = D.bio_short;
        var bioExpanded = document.getElementById('bioExpanded');
        if (D.bio_full && D.bio_full.length) {
            bioExpanded.innerHTML = D.bio_full.map(function(p){return'<p>'+p+'</p>';}).join('');
        } else {
            document.getElementById('bioToggle').style.display = 'none';
        }
        var tagsEl = document.getElementById('bioTags');
        var groups = [{label:'type',items:D.types||[]},{label:'style',items:D.styles||[]}].filter(function(g){return g.items.length;});
        if (!groups.length) {
            tagsEl.style.display = 'none';
            document.querySelector('.bio-inner').style.gridTemplateColumns = '1fr';
        } else {
            groups.forEach(function(g) {
                var el = document.createElement('div');
                el.className = 'tag-group';
                el.innerHTML = '<span class="tag-label">'+g.label+'</span><div class="tags">'+g.items.map(function(t){return'<span class="tag">'+t+'</span>';}).join('')+'</div>';
                tagsEl.appendChild(el);
            });
        }
        var grid = document.getElementById('workGrid');
        if (!D.work || !D.work.length) {
            document.getElementById('workSection').style.display = 'none';
            return;
        }
        D.work.forEach(function(item, i) {
            var card = document.createElement('a');
            card.className = 'work-card';
            card.href = '#';
            card.setAttribute('data-vimeo',  item.vimeo  || '');
            card.setAttribute('data-hash',   item.hash   || '');
            card.setAttribute('data-client', item.client || '');
            card.setAttribute('data-title',  item.title  || '');
            card.innerHTML = (item.thumbnail
                ? '<img class="card-thumb" src="'+item.thumbnail+'" width="1280" height="720" alt="'+item.client+', '+item.title+'" loading="lazy">'
                : '<div class="card-thumb" style="background:#1a1a1a;"></div>') +
                '<div class="card-video" id="cardVideo'+i+'"></div>' +
                '<div class="card-scrim"></div>' +
                '<div class="card-text"><p class="card-client">'+item.client+'</p><p class="card-title">'+item.title+'</p></div>';
            grid.appendChild(card);
            if (!item.thumbnail && item.vimeo) {
                (function(vimeoId, hash, cardEl, client, title) {
                    var vUrl = 'https://vimeo.com/' + vimeoId + (hash ? '/' + hash : '');
                    fetch('https://vimeo.com/api/oembed.json?url=' + encodeURIComponent(vUrl) + '&width=1280')
                        .then(function(r){return r.json();})
                        .then(function(data){
                            if(!data.thumbnail_url) return;
                            var placeholder = cardEl.querySelector('.card-thumb');
                            if(!placeholder) return;
                            var img = document.createElement('img');
                            img.className = 'card-thumb';
                            img.src = data.thumbnail_url.replace(/_\d+x\d+(\.\w+)$/, '_1280x720$1');
                            img.width = 1280; img.height = 720;
                            img.alt = client + ', ' + title; img.loading = 'lazy';
                            placeholder.parentNode.replaceChild(img, placeholder);
                        })
                        .catch(function(){});
                })(item.vimeo, item.hash||'', card, item.client, item.title);
            }
            card.setAttribute('data-zoom', String(item.zoom || 1.32));
            if (item.vimeo && window.matchMedia('(pointer:fine)').matches) {
                var vl = card.querySelector('#cardVideo'+i);
                if (vl) {
                    card.addEventListener('mouseenter', function() { vl.classList.add('playing'); });
                    card.addEventListener('mouseleave', function() { vl.classList.remove('playing'); });
                }
            }
        });
    })();

    window.addEventListener('load', function() {
        try {
            if (!window.matchMedia('(pointer:fine)').matches) return;
            document.querySelectorAll('.work-card').forEach(function(card) {
                var vimeo = card.getAttribute('data-vimeo');
                if (!vimeo) return;
                var vl = card.querySelector('.card-video');
                if (!vl) return;
                var hash = card.getAttribute('data-hash') || '';
                var zoom = parseFloat(card.getAttribute('data-zoom') || '1.32');
                var iframe = document.createElement('iframe');
                iframe.allow = 'autoplay; fullscreen; picture-in-picture';
                iframe.style.width = (zoom * 100) + '%';
                iframe.style.height = (zoom * 100) + '%';
                iframe.src = 'https://player.vimeo.com/video/' + vimeo
                    + '?' + (hash ? 'h=' + hash + '&' : '')
                    + 'autoplay=1&muted=1&loop=1&controls=0&background=1&dnt=1';
                vl.appendChild(iframe);
            });
        } catch(e) {}
    }, {once: true});

    (function initWorkViewer() {
        var viewerItems = [];
        document.querySelectorAll('.work-card').forEach(function(card, i) {
            viewerItems.push({ vimeo:card.getAttribute('data-vimeo'), hash:card.getAttribute('data-hash')||'', client:card.getAttribute('data-client'), title:card.getAttribute('data-title') });
            card.addEventListener('click', function(e) { e.preventDefault(); openViewer(i); });
        });
        var viewer   = document.getElementById('workViewer');
        var frame    = document.getElementById('viewerFrame');
        var vHero    = document.getElementById('viewerVideoHero');
        var iframe   = document.getElementById('viewerIframe');
        var clientEl = document.getElementById('viewerClient');
        var titleEl  = document.getElementById('viewerTitleText');
        var closeBtn = document.getElementById('viewerClose');
        var prevBtn  = document.getElementById('viewerPrev');
        var nextBtn  = document.getElementById('viewerNext');
        var ppBtn    = document.getElementById('viewerPlayPause');
        var progEl   = document.getElementById('viewerProgress');
        var fillEl   = document.getElementById('viewerFill');
        var timeEl   = document.getElementById('viewerTime');
        var fsBtn    = document.getElementById('viewerFsBtn');
        var clickLayer = document.getElementById('viewerClickLayer');
        var current = -1, vPlayer = null, vDuration = 0, vPlaying = false, idleTimer = null;
        function fmt(s) { var m=Math.floor(s/60),sec=Math.floor(s%60); return (m<10?'0':'')+m+':'+(sec<10?'0':'')+sec; }
        function setPlaying(p) { vPlaying=p; vHero.classList.toggle('cs-playing',p); }
        function resetPlayer() {
            if (vPlayer) { try { vPlayer.destroy(); } catch(e){} vPlayer=null; }
            vPlaying=false; vDuration=0;
            vHero.classList.remove('cs-playing','cs-hover');
            if (fillEl) fillEl.style.width='0%';
            if (timeEl) timeEl.textContent='00:00 / 00:00';
        }
        function bindPlayer(p) {
            p.getDuration().then(function(d){ vDuration=d; if(timeEl&&d) timeEl.textContent='00:00 / '+fmt(d); }).catch(function(){});
            p.on('play',  function(){ setPlaying(true); });
            p.on('pause', function(){ setPlaying(false); });
            p.on('ended', function(){ setPlaying(false); });
            p.on('timeupdate', function(data){ if(!vDuration||!fillEl)return; fillEl.style.width=(data.seconds/vDuration*100)+'%'; if(timeEl) timeEl.textContent=fmt(data.seconds)+' / '+fmt(vDuration); });
        }
        function openViewer(idx) {
            current=idx; var item=viewerItems[idx];
            resetPlayer();
            iframe.src='https://player.vimeo.com/video/'+item.vimeo+'?'+(item.hash?'h='+item.hash+'&':'')+'autoplay=1&controls=0&dnt=1';
            clientEl.textContent=item.client||''; titleEl.textContent=item.title||'';
            viewer.classList.add('active'); document.body.style.overflow='hidden';
            prevBtn.style.opacity=idx>0?'0.6':'0.15';
            nextBtn.style.opacity=idx<viewerItems.length-1?'0.6':'0.15';
            iframe.onload=function(){ try{ if(!window.Vimeo)return; vPlayer=new Vimeo.Player(iframe); bindPlayer(vPlayer); }catch(e){} };
        }
        function closeViewer() {
            viewer.classList.remove('active'); clearTimeout(idleTimer); resetPlayer();
            setTimeout(function(){ iframe.src=''; },300); document.body.style.overflow='';
        }
        function togglePlay() { if(!vPlayer)return; if(vPlaying) vPlayer.pause(); else vPlayer.play(); }
        clickLayer.addEventListener('click', function(e){ e.stopPropagation(); togglePlay(); });
        ppBtn.addEventListener('click', function(e){ e.stopPropagation(); togglePlay(); });
        progEl.addEventListener('click', function(e){
            e.stopPropagation();
            if(!vPlayer||!vDuration)return;
            var rect=progEl.getBoundingClientRect();
            vPlayer.setCurrentTime(((e.clientX-rect.left)/rect.width)*vDuration).catch(function(){});
        });
        fsBtn.addEventListener('click', function(e){
            e.stopPropagation();
            var target=frame||viewer;
            if(document.fullscreenElement) document.exitFullscreen().catch(function(){});
            else target.requestFullscreen().catch(function(){});
        });
        vHero.addEventListener('mouseenter', function(){ vHero.classList.add('cs-hover'); clearTimeout(idleTimer); if(vPlaying) idleTimer=setTimeout(function(){ vHero.classList.remove('cs-hover'); },2000); });
        vHero.addEventListener('mouseleave', function(){ vHero.classList.remove('cs-hover'); clearTimeout(idleTimer); });
        vHero.addEventListener('mousemove',  function(){ vHero.classList.add('cs-hover'); clearTimeout(idleTimer); if(vPlaying) idleTimer=setTimeout(function(){ vHero.classList.remove('cs-hover'); },2000); });
        closeBtn.addEventListener('click',closeViewer);
        viewer.addEventListener('click',function(e){if(e.target===viewer)closeViewer();});
        prevBtn.addEventListener('click',function(){if(current>0)openViewer(current-1);});
        nextBtn.addEventListener('click',function(){if(current<viewerItems.length-1)openViewer(current+1);});
        document.addEventListener('keydown',function(e){
            if(!viewer.classList.contains('active'))return;
            if(e.key==='Escape')closeViewer();
            if(e.key==='ArrowLeft'&&current>0)openViewer(current-1);
            if(e.key==='ArrowRight'&&current<viewerItems.length-1)openViewer(current+1);
            if(e.key===' '){e.preventDefault();togglePlay();}
        });
    })();

    (function initBioToggle() {
        var toggle=document.getElementById('bioToggle'), expanded=document.getElementById('bioExpanded');
        if(!toggle) return;
        toggle.addEventListener('click',function(){var o=expanded.classList.toggle('open');toggle.classList.toggle('open',o);});

        mo.addEventListener('click',function(e){if(e.target===mo){mt.classList.remove('active');mo.classList.remove('active');}});

    (function initFooterContrast(){
        var footer = document.querySelector('.site-footer');
        var light = document.querySelector('.work-section');
        if (!footer || !light) return;
        var raf = null;
        function update(){
            var fr = footer.getBoundingClientRect();
            var fcy = fr.top + fr.height / 2;
            var lr = light.getBoundingClientRect();
            footer.classList.toggle('on-light', lr.top <= fcy && lr.bottom >= fcy);
        }
        function onScroll(){ if (!raf) raf = requestAnimationFrame(function(){ update(); raf = null; }); }
        window.addEventListener('scroll', onScroll, {passive:true});
        window.addEventListener('resize', onScroll, {passive:true});
        update();
    })();

    (function initReveal() {
        var cards = Array.prototype.slice.call(document.querySelectorAll(".work-card"));
        if (!cards.length) return;
        if (!("IntersectionObserver" in window)) { cards.forEach(function(c){ c.classList.add("revealed"); }); return; }
        var io = new IntersectionObserver(function(entries) {
            entries.forEach(function(e) {
                if (e.isIntersecting) { e.target.classList.add("revealed"); io.unobserve(e.target); }
            });
        }, { threshold: 0.15, rootMargin: "0px 0px -10% 0px" });
        cards.forEach(function(card) { io.observe(card); });
    })();

    (function initCursor() {
        var cursor=document.getElementById('cursor'); if(!cursor) return;
        var mx=0,my=0,cx=0,cy=0,sc=1; window._cursorTargetScale=1;
        document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;});
        (function loop(){cx+=(mx-cx)*0.5;cy+=(my-cy)*0.5;sc+=(window._cursorTargetScale-sc)*0.15;cursor.style.transform='translate('+(cx-5)+'px,'+(cy-5)+'px) scale('+sc+')';requestAnimationFrame(loop);})();
    })();

    (function initDarkMode() {
        var toggle=document.getElementById('darkModeToggle');
        if(localStorage.getItem('darkMode')==='true'){document.body.classList.add('dark-mode');toggle.checked=true;}
        toggle.addEventListener('change',function(){document.body.classList.toggle('dark-mode');localStorage.setItem('darkMode',document.body.classList.contains('dark-mode'));});
    })();

    (function initPageGate(){
        var shown=false;
        function show(){if(shown)return;shown=true;document.body.classList.add('page-ready');}
        var iframe=document.querySelector('.hero-video iframe');
        if(iframe){iframe.addEventListener('load',show);setTimeout(show,1200);}else show();
    })();
    </script>

    <script>
    (function(){
        function enforceNoCursor(){var e=document.getElementById('no-native-cursor');if(e)e.remove();var s=document.createElement('style');s.id='no-native-cursor';s.textContent='html,html *,body,body *{cursor:none !important;}';document.head.appendChild(s);}
        enforceNoCursor();
        window.addEventListener('pageshow',function(){enforceNoCursor();var c=document.getElementById('cursor');if(c&&!('ontouchstart'in window))c.style.display='block';});
        document.addEventListener('visibilitychange',function(){if(!document.hidden)enforceNoCursor();});

    <!-- Custom click cursor: knockout label box over clickable elements -->
    <script>
    (function(){
      try {
        if (window.matchMedia && window.matchMedia('(pointer: coarse)').matches) return;
        var st = document.createElement('style');
        st.textContent = '#clickCursor{position:fixed;text-transform:uppercase;left:-200px;top:-200px;transform:translate(-50%,-50%) scale(.7);opacity:0;pointer-events:none;z-index:10050;mix-blend-mode:difference;transition:opacity .25s ease,transform .3s cubic-bezier(.2,.8,.2,1);will-change:transform,left,top,opacity}#clickCursor.show{opacity:1;transform:translate(-50%,-50%) scale(1)}body.click-cursor-active .cursor{opacity:0 !important}';
        document.head.appendChild(st);
        var box = document.createElement('div');
        box.id = 'clickCursor';
        box.setAttribute('aria-hidden','true');
        document.body.appendChild(box);
        function makeBox(label){
          var w = Math.max(56, Math.round(label.length * 8.6 + 28)), h = 26;
          return '<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'" xmlns="http://www.w3.org/2000/svg"><defs><mask id="clickCursorMask"><rect width="'+w+'" height="'+h+'" rx="5" fill="#fff"/><text x="'+(w/2)+'" y="14" text-anchor="middle" dominant-baseline="middle" font-family="Space Grotesk, sans-serif" font-weight="700" font-size="12" letter-spacing="-0.2" fill="#000">'+label+'</text></mask></defs><rect width="'+w+'" height="'+h+'" rx="5" fill="#fff" mask="url(#clickCursorMask)"/></svg>';
        }
        var current = '';
        function setLabel(l){ if (l === current) return; current = l; box.innerHTML = makeBox(l); }
        setLabel('CLICK');
        function menuOpen(){ return !!document.querySelector('.menu-overlay.active'); }
        function hide(){ box.classList.remove('show'); document.body.classList.remove('click-cursor-active'); }
        function show(el){
          if (menuOpen()) { hide(); return; }
          var lbl = (el.getAttribute && el.getAttribute('data-cursor')) || 'CLICK';
          setLabel(String(lbl).toUpperCase());
          box.classList.add('show');
          document.body.classList.add('click-cursor-active');
        }
        document.addEventListener('mousemove', function(e){
          box.style.left = e.clientX + 'px'; box.style.top = e.clientY + 'px';
          if (menuOpen() && box.classList.contains('show')) hide();
        }, {passive:true});
        var sel = 'a[href], button, label, input, select, textarea, summary, [role=button], [onclick], .cs-ctrl, .dark-mode-toggle, .logo-bottom, .project-client-link, [data-cursor]';
        function hit(t){ if (!t || !t.closest) return null; if (t.closest('.site-footer, .footer, .lab-footer')) return null; if (t.closest('.cs-video-controls') && !t.closest('.cs-ctrl')) return null; if (t.closest('.work-card')) return null; if (t.closest('.bio-toggle')) return null; return t.closest(sel); }
        document.addEventListener('mouseover', function(e){ var el = hit(e.target); if (el) show(el); }, {passive:true});
        document.addEventListener('mouseout', function(e){ if (hit(e.target) && !hit(e.relatedTarget)) hide(); }, {passive:true});
      } catch(err){}
    })();
    </script>
</body>
</html>
