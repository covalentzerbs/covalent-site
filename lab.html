    <style>
        @font-face {
            font-family: 'Satoshi';
            src: url('assets/fonts/Satoshi-Variable.ttf') format('truetype');
            font-weight: 300 900;
            font-display: swap;
        }

        /* CSS Variables */
        :root {
            --ice: #FAFBFC;
            --bond-blue: #5979e9;
            --black: #0A0A0A;
            --gray: #6B7280;
            --white: #FFFFFF;
        }

        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        ::selection {
            background: var(--white);
            color: var(--black);
            -webkit-text-fill-color: var(--black);
        }

        html, body {
            height: 100%;
        }

        /* Custom Cursor */
        .cursor {
            position: fixed;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #A6FF8E;
            pointer-events: none;
            z-index: 10001;
            mix-blend-mode: difference;
            transform: translate(-50%, -50%);
        }

        body {
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--black);
            color: var(--white);
            overflow-x: hidden;
            letter-spacing: -0.07em;
        }

        /* Navigation - Plus Menu */
        .nav {
            position: fixed;
            top: 0;
            right: 0;
            padding: 2rem;
            z-index: 1000;
        }

        .menu-toggle {
            width: 48px;
            height: 48px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .menu-toggle.active {
            transform: rotate(45deg);
        }

        .plus-icon {
            width: 22px;
            height: 22px;
            position: relative;
        }

        .plus-icon span {
            display: block;
            position: absolute;
            width: 100%;
            height: 2px;
            background: #A6FF8E;
            top: 50%;
            left: 0;
            transition: all 0.3s ease;
        }

        .plus-icon span:first-child {
            transform: translateY(-50%) rotate(90deg);
        }

        .plus-icon span:last-child {
            transform: translateY(-50%);
        }

        /* Expanded Menu */
        .menu-overlay {
            position: fixed;
            top: 0;
            right: 0;
            width: 100%;
            height: 100%;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-end;
            padding: 3rem;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .menu-overlay.active {
            pointer-events: auto;
            opacity: 1;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.3);
        }

        .menu-links {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .menu-link {
            font-size: clamp(3.5rem, 8vw, 7rem);
            font-weight: 500;
            color: #A6FF8E;
            text-decoration: none;
            opacity: 0;
            transform: translateX(30px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: -0.07em;
            line-height: 1.05;
        }

        .menu-overlay.active .menu-link {
            opacity: 0.6;
            transform: translateX(0);
        }

        .menu-overlay.active .menu-link:nth-child(1) { transition-delay: 0.05s; }
        .menu-overlay.active .menu-link:nth-child(2) { transition-delay: 0.1s; }
        .menu-overlay.active .menu-link:nth-child(3) { transition-delay: 0.15s; }
        .menu-overlay.active .menu-link:nth-child(4) { transition-delay: 0.25s; }
        .menu-overlay.active .menu-link:nth-child(5) { transition-delay: 0.3s; }

        
        .menu-spacer {
            height: 0.8em;
        }

        .menu-socials {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            margin-top: 1.5rem;
            opacity: 0;
            transform: translateX(30px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .menu-overlay.active .menu-socials {
            opacity: 0.5;
            transform: translateX(0);
            transition-delay: 0.3s;
        }

        .menu-link-lab {
            color: #A6FF8E;
        }

        .menu-link-bond {
            font-family: 'Satoshi', sans-serif;
            font-weight: 700;
            letter-spacing: -0.03em;
            color: var(--bond-blue);
        }

        .menu-link:hover {
            opacity: 1 !important;
        }

        .menu-link {
            position: relative;
            display: inline-block;
        }

        .menu-link-gradient {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #5979e9, #7B93FF, #5979e9, #3A5BD4);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 3s ease infinite;
            pointer-events: none;
            -webkit-mask-image: radial-gradient(circle at var(--mx, 0px) var(--my, 0px), black var(--spread, 0%), transparent var(--spread, 0%));
            mask-image: radial-gradient(circle at var(--mx, 0px) var(--my, 0px), black var(--spread, 0%), transparent var(--spread, 0%));
            opacity: 0;
            transition: opacity 0s;
        }

        .menu-link:hover .menu-link-gradient {
            opacity: 1;
        }

        .menu-link.current {
            opacity: 1 !important;
        }

        /* Logo Bottom Right */
        .logo-bottom {
            position: fixed;
            top: 2rem;
            left: 2rem;
            z-index: 1000;
            opacity: 1;
            transition: opacity 0.3s ease;
        }

        .logo-bottom:hover {
            opacity: 0.7;
        }

        .logo-bottom svg {
            width: 40px;
            height: 40px;
        }

        .logo-bottom svg path {
            fill: #A6FF8E;
        }

        /* ==================== */
        /* THE LAB PAGE */
        /* ==================== */
        .lab-page {
            padding: 8rem 3.5rem 6rem;
            margin: 0 auto;
        }

        /* Hero */
        .lab-hero {
            min-height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .lab-hero h1 {
            font-size: clamp(6rem, 18vw, 20rem);
            font-weight: 700;
            line-height: 0.9;
            letter-spacing: -0.07em;
            color: #A6FF8E;
            text-transform: lowercase;
            width: 100%;
        }

        .lab-hero-sub {
            font-size: clamp(1rem, 2vw, 1.5rem);
            font-weight: 300;
            color: #A6FF8E;
            letter-spacing: -0.07em;
            margin-top: 1rem;
            opacity: 0.5;
        }

        .lab-hero-copy {
            font-size: clamp(0.85rem, 1.2vw, 1rem);
            font-weight: 400;
            color: #A6FF8E;
            line-height: 1.6;
            max-width: 640px;
            margin-top: 2rem;
            opacity: 0.5;
        }

        /* Coming Soon */
        .lab-coming-soon {
            padding: 6rem 0 2rem;
        }

        .lab-coming-soon p {
            font-size: clamp(1rem, 2vw, 1.5rem);
            font-weight: 300;
            color: #A6FF8E;
            letter-spacing: -0.07em;
            opacity: 0.3;
        }

        /* ==================== */
        /* RESPONSIVE */
        /* ==================== */
        @media (max-width: 1024px) {
            .nav {
                padding: 1.5rem;
            }

            .logo-bottom {
                top: 1.5rem;
                left: 1.5rem;
            }

            .menu-overlay {
                padding: 6rem 2.5rem 2.5rem;
            }

            .lab-page {
                padding: 7rem 2.5rem 4rem;
            }
        }

        @media (max-width: 768px) {
            .nav {
                padding: 1.5rem 1.5rem;
            }

            .logo-bottom {
                top: 1.5rem;
                left: 1.5rem;
            }

            .logo-bottom svg {
                width: 32px;
                height: 32px;
            }

            .menu-overlay {
                padding: 5rem 1.5rem 1.5rem;
            }

            .lab-page {
                padding: 6rem 1.5rem 3rem;
            }

            .lab-hero {
                min-height: 50vh;
            }
        }

        /* Hide dot cursor on touch devices */
        @media (pointer: coarse) {
            .cursor { display: none !important; }
            * { cursor: auto !important; }
        }

    </style>

    <script>
        // ==================== //
        // CUSTOM CURSOR
        // ==================== //
        const cursor = document.getElementById('cursor');
        if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
            cursor.style.display = 'none';
        }

        let mouseX = 0, mouseY = 0;
        let cursorX = 0, cursorY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function animateCursor() {
            cursorX += (mouseX - cursorX) * 0.35;
            cursorY += (mouseY - cursorY) * 0.35;
            cursor.style.left = cursorX + 'px';
            cursor.style.top = cursorY + 'px';
            requestAnimationFrame(animateCursor);
        }
        animateCursor();

        // ==================== //
        // MENU TOGGLE
        // ==================== //
        const menuToggle = document.getElementById('menuToggle');
        const menuOverlay = document.getElementById('menuOverlay');

        menuToggle.addEventListener('click', () => {
            menuToggle.classList.toggle('active');
            menuOverlay.classList.toggle('active');
        });

        menuOverlay.addEventListener('click', (e) => {
            if (e.target === menuOverlay) {
                menuToggle.classList.remove('active');
                menuOverlay.classList.remove('active');
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && menuOverlay.classList.contains('active')) {
                menuToggle.classList.remove('active');
                menuOverlay.classList.remove('active');
            }
        });

        // ==================== //
        // MENU LINK GRADIENT SPREAD EFFECT
        // ==================== //
        // (menu hover handled by CSS only)
    </script>

    <script src="scripts/analytics.js"></script>

    <script>
    // Re-enforce cursor:none via injected stylesheet (bfcache-safe)
    (function() {
        function enforceNoCursor() {
            var existing = document.getElementById('no-native-cursor');
            if (existing) existing.remove();
            var style = document.createElement('style');
            style.id = 'no-native-cursor';
            style.textContent = 'html, html *, body, body * { cursor: none !important; }';
            document.head.appendChild(style);
        }
        enforceNoCursor();
        window.addEventListener('pageshow', function(e) {
            enforceNoCursor();
            var cursor = document.getElementById('cursor');
            if (cursor && !('ontouchstart' in window)) {
                cursor.style.display = 'block';
            }
        });
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) enforceNoCursor();
        });
    })();
    </script>
